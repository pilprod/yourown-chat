apiVersion: v1
kind: ServiceAccount
metadata:
  name: ingress-nginx-updater
  namespace: ingress-nginx
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: ingress-nginx-updater
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: cluster-admin
subjects:
  - kind: ServiceAccount
    name: ingress-nginx-updater
    namespace: ingress-nginx
---
apiVersion: batch/v1
kind: CronJob
metadata:
  name: ingress-nginx-autoupdate
  namespace: ingress-nginx
spec:
  schedule: "17 3 * * 1"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      backoffLimit: 1
      template:
        spec:
          serviceAccountName: ingress-nginx-updater
          restartPolicy: Never
          containers:
            - name: helm
              image: dtzar/helm-kubectl:3.18.6
              imagePullPolicy: IfNotPresent
              command:
                - sh
                - -ceu
                - |
                  helm repo add ingress-nginx https://kubernetes.github.io/ingress-nginx --force-update
                  helm repo update

                  helm upgrade -i ingress-nginx \
                    -n ingress-nginx \
                    --create-namespace \
                    --set controller.kind=DaemonSet \
                    --set controller.hostNetwork=true \
                    --set controller.dnsPolicy=ClusterFirstWithHostNet \
                    --set controller.service.enabled=false \
                    --set controller.ingressClassResource.default=true \
                    --set controller.allowSnippetAnnotations=false \
                    --set controller.config.annotations-risk-level=Medium \
                    --set controller.config.server-tokens=false \
                    ingress-nginx/ingress-nginx \
                    --wait \
                    --timeout=5m

                  kubectl -n ingress-nginx rollout status daemonset/ingress-nginx-controller --timeout=5m