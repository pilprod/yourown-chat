apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: mattermost-internal
  namespace: mattermost
  annotations:
    kubernetes.io/ingress.class: "gce-internal"
    ingress.gcp.kubernetes.io/redirect-http-to-https: "true"
    kubernetes.io/ingress.allow-http: "false"
    kubernetes.io/ingress.regional-static-ip-name: "mattermost-asia-static-ip"
spec:
  ingressClassName: gce-internal
  tls:
    - hosts:
        - yourown.chat
      secretName: yourown-chat-tls
    # - hosts:
    #     - rtcd.yourown.chat
    #   secretName: yourown-chat-rtcd-tls
  rules:
    - host: yourown.chat
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: yourown-chat
                port:
                  number: 8065
    # - host: rtcd.yourown.chat
    #   http:
    #     paths:
    #       - path: /
    #         pathType: Prefix
    #         backend:
    #           service:
    #             name: yourown-chat-rtcd
    #             port:
    #               number: 8443