apiVersion: batch/v1
kind: Job
metadata:
  name: dev-mattermost-cleanup
  namespace: dev
spec:
  backoffLimit: 1
  ttlSecondsAfterFinished: 120
  template:
    spec:
      serviceAccountName: dev-mattermost-cleanup
      restartPolicy: Never
      priorityClassName: development
      containers:
        - name: cleanup
          image: bitnami/kubectl:1.33
