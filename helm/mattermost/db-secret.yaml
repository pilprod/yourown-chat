# Prod Mattermost external database Secret (Cloud SQL connection string).
#
# The value is the Terraform-written `cloudsql-mattermost-connection` Secret
# Manager secret (created at Cloud SQL init), injected here by Cloud Deploy from
# the `mattermost_db_connection` deploy parameter — no plaintext in git. The
# operator CR references it as spec.database.external.secret: mattermost-db.
#
# Why not CSI/secretObjects? The cluster runs the MANAGED GKE Secret Manager
# add-on, which mounts secrets as files but cannot sync them into Kubernetes
# Secrets. The operator only consumes a Kubernetes Secret, so the value is
# rendered straight in via a deploy parameter (Cloud Deploy owns the namespace
# and this Secret in one render).
apiVersion: v1
kind: Secret
metadata:
  name: mattermost-db
  namespace: mattermost
  labels:
    app: mattermost
type: Opaque
stringData:
  # Whole-value substitution (Cloud Deploy from-param replaces the entire field).
  DB_CONNECTION_STRING: "from-deploy-parameters" # from-param: ${mattermost_db_connection}
