{{- if eq .Values.environment "prod" }}
# Kubernetes SA for the prod Mattermost tenant, bound to a Google SA via
# Workload Identity. Replace the annotation value with the Terraform output
# `workload_identity_emails["mattermost"]` (e.g. mattermost@PROJECT.iam.gserviceaccount.com).
apiVersion: v1
kind: ServiceAccount
metadata:
  name: mattermost
  namespace: mattermost
  annotations:
    iam.gke.io/gcp-service-account: "from-deploy-parameters" # from-param: ${mattermost_gsa}
{{- end }}
