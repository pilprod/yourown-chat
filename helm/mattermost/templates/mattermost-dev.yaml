{{- if eq .Values.environment "dev" }}
# Dev Mattermost (Team Edition), run as a plain Deployment (no operator) to keep
# dev lightweight. Local filestore on a 10Gi PVC, backed by the in-cluster
# Postgres. Low priority on the shared node pool. The DB password is injected from the
# CSI-synced `dev-postgres` Secret and expanded into the datasource by Kubelet's
# $(VAR) substitution.
apiVersion: v1
kind: Service
metadata:
  name: dev-mattermost
  namespace: dev
  labels:
    app: dev-mattermost
spec:
  selector:
    app: dev-mattermost
  ports:
    - name: http
      port: 8065
      targetPort: 8065
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: dev-mattermost-data
  namespace: dev
spec:
  accessModes: ["ReadWriteOnce"]
  resources:
    requests:
      storage: 10Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: dev-mattermost
  namespace: dev
  labels:
    app: dev-mattermost
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: dev-mattermost
  template:
    metadata:
      labels:
        app: dev-mattermost
    spec:
      serviceAccountName: dev-app
      priorityClassName: {{ .Values.priorityClassName }}
      securityContext:
        fsGroup: 2000
      containers:
        - name: mattermost
          # Custom (patched) image built by the image-CI components (terraform/) on
          # git tags matching ^v.*-patched$ and pushed to the unified registry
          # (docker). Build once, promote the SAME image dev -> prod: dev
          # and prod reference the identical tag (no separate -patched-dev build).
          image: "europe-west3-docker.pkg.dev/yourown-chat/docker/mattermost:v11.8.3-patched" # from-param: ${mattermost_dev_image}
          env:
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: dev-postgres
                  key: POSTGRES_PASSWORD
            - name: MM_SQLSETTINGS_DRIVERNAME
              value: postgres
            - name: MM_SQLSETTINGS_DATASOURCE
              value: "postgres://mmuser:$(POSTGRES_PASSWORD)@dev-postgres:5432/mattermost?sslmode=disable&connect_timeout=10"
            - name: MM_FILESETTINGS_DRIVERNAME
              value: local
            - name: MM_FILESETTINGS_DIRECTORY
              value: /mattermost/data
            - name: MM_SERVICESETTINGS_SITEURL
              value: https://dev.yourown.chat
            # Mattermost blocks RFC1918 destinations for user-controlled
            # integrations by default. Allow only our three exact in-cluster
            # MCP service names, never the cluster CIDR.
            - name: MM_SERVICESETTINGS_ALLOWEDUNTRUSTEDINTERNALCONNECTIONS
              value: >-
                mcp-terraform.mcp-terraform.svc.cluster.local
                mcp-google-cloud.mcp-google-cloud.svc.cluster.local
                mcp-google-workspace.mcp-google-workspace.svc.cluster.local
          ports:
            - containerPort: 8065
          resources:
            requests:
              cpu: 20m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
          volumeMounts:
            - name: data
              mountPath: /mattermost/data
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: dev-mattermost-data
{{- end }}
