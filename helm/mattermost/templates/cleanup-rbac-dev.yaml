{{- if eq .Values.environment "dev" }}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: dev-mattermost-cleanup
  namespace: dev
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: dev-mattermost-cleanup
  namespace: dev
rules:
  - apiGroups: ["apps"]
    resources: ["deployments"]
    resourceNames: ["dev-mattermost"]
    verbs: ["get", "patch", "update"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: dev-mattermost-cleanup
  namespace: dev
subjects:
  - kind: ServiceAccount
    name: dev-mattermost-cleanup
    namespace: dev
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: dev-mattermost-cleanup
{{- end }}
