# Minimal pod whose only job is to keep the CSI volume mounted so the
# SecretProviderClass secretObjects (mattermost-db, mattermost-filestore) stay
# materialised for the operator-managed Mattermost pods. Pinned to the prod
# node pool so it shares the tenant's failure domain.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: secret-sync
  namespace: mattermost
  labels:
    app: secret-sync
spec:
  replicas: 1
  selector:
    matchLabels:
      app: secret-sync
  template:
    metadata:
      labels:
        app: secret-sync
    spec:
      serviceAccountName: mattermost
      nodeSelector:
        tier: prod
      tolerations:
        - key: dedicated
          operator: Equal
          value: prod
          effect: NoSchedule
      containers:
        - name: pause
          image: registry.k8s.io/pause:3.9
          resources:
            requests:
              cpu: 10m
              memory: 16Mi
            limits:
              cpu: 50m
              memory: 32Mi
          volumeMounts:
            - name: secrets
              mountPath: /var/secrets
              readOnly: true
      volumes:
        - name: secrets
          csi:
            driver: secrets-store-gke.csi.k8s.io
            readOnly: true
            volumeAttributes:
              secretProviderClass: mattermost-gcp
