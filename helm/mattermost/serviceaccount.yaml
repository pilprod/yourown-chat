# Kubernetes SA for the prod Mattermost tenant, bound to a Google SA via
# Workload Identity. Replace the annotation value with the Terraform output
# `workload_identity_emails["mattermost"]` (e.g. yourown-chat-prod-mm@PROJECT.iam.gserviceaccount.com).
apiVersion: v1
kind: ServiceAccount
metadata:
  name: mattermost
  namespace: mattermost
  annotations:
    iam.gke.io/gcp-service-account: "REPLACE-ME-yourown-chat-prod-mm@REPLACE-ME-PROJECT.iam.gserviceaccount.com"
