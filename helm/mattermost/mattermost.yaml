# Prod Mattermost, managed by the Mattermost Operator (installation.mattermost.com/v1beta1).
# Requires the operator + CRDs to be installed first (see helm/README.md).
#
# Scheduling: pinned to the dedicated prod node pool (nodeSelector tier=prod +
# toleration for the dedicated=prod taint) so dev/bridge workloads can never
# contend with prod for CPU/memory.
#
# Database  : external Cloud SQL (secret mattermost-db, materialised from Secret
#             Manager by the CSI SecretProviderClass).
# Filestore : external GCS via the S3-compatible interoperability endpoint
#             (secret mattermost-filestore).
# Ingress   : public host yourown.chat, fronted by Cloudflare. ingress-nginx
#             admits only Cloudflare source ranges (helm/ingress-nginx) and
#             enforces Authenticated Origin Pulls (mTLS) + Full (Strict) TLS via
#             the mattermost-origin-tls / cloudflare-origin-pull-ca Secrets.
#
# Replace REPLACE-ME-* (bucket) before applying. The image below is built and
# pushed by the build stack (terraform/build) on git tags matching ^v.*-patched$.
apiVersion: installation.mattermost.com/v1beta1
kind: Mattermost
metadata:
  name: mattermost
  namespace: mattermost
spec:
  # Custom (patched) image built by the build stack and pushed to the unified
  # registry (docker). The operator assembles the full ref as
  # "<image>:<version>", so `version` is the git tag Cloud Build produced.
  image: "europe-west3-docker.pkg.dev/yourown-chat/docker/mattermost"
  # Must match a pushed git tag matching ^v.*-patched$ (see terraform/build).
  version: "v9.11.3-patched"
  replicas: 1

  ingress:
    enabled: true
    host: "yourown.chat"
    ingressClass: nginx
    # Full (Strict): serve the Cloudflare Origin CA keypair so the Cloudflare
    # edge validates the origin over HTTPS. Materialised as a kubernetes.io/tls
    # Secret from Secret Manager by the CSI SecretProviderClass.
    tlsSecret: mattermost-origin-tls
    annotations:
      # Authenticated Origin Pulls (mTLS): the origin only completes the TLS
      # handshake when the caller presents the client cert from OUR Cloudflare
      # zone. Use per-hostname AOP (your own client cert) so the shared
      # Cloudflare proxy IPs of other tenants cannot reach this origin. The CA
      # that signs Cloudflare's client cert is mounted as ca.crt in the
      # cloudflare-origin-pull-ca Secret.
      nginx.ingress.kubernetes.io/auth-tls-verify-client: "on"
      nginx.ingress.kubernetes.io/auth-tls-secret: "mattermost/cloudflare-origin-pull-ca"
      nginx.ingress.kubernetes.io/auth-tls-verify-depth: "1"
      nginx.ingress.kubernetes.io/ssl-redirect: "true"

  database:
    external:
      secret: mattermost-db

  fileStore:
    external:
      url: storage.googleapis.com
      bucket: "REPLACE-ME-yourown-chat-BUCKET"
      secret: mattermost-filestore

  scheduling:
    nodeSelector:
      tier: prod
    tolerations:
      - key: dedicated
        operator: Equal
        value: prod
        effect: NoSchedule
    resources:
      requests:
        cpu: 250m
        memory: 512Mi
      limits:
        cpu: "1"
        memory: 1Gi
