# Prod Mattermost (Mattermost Operator CR; operator + CRDs installed first).
# Pinned to the prod node pool. DB (Cloud SQL) and filestore (GCS) are external
# Secrets created directly in etcd by Terraform (app-gcp cluster_secrets), never
# through Cloud Deploy. Ingress: public yourown.chat behind Cloudflare, with
# Full (Strict) TLS + optional AOP mTLS. Image built by the image-CI on
# ^v.*-patched$ tags; bucket injected via Cloud Deploy from-param.
apiVersion: installation.mattermost.com/v1beta1
kind: Mattermost
metadata:
  name: mattermost
  namespace: mattermost
spec:
  # The operator assembles the ref as "<image>:<version>"; version is the
  # pushed git tag (^v.*-patched$).
  image: "europe-west3-docker.pkg.dev/yourown-chat/docker/mattermost"
  version: "v11.8.3-patched"
  replicas: 1

  ingress:
    enabled: true
    host: "yourown.chat"
    ingressClass: nginx
    tlsSecret: mattermost-origin-tls
    annotations:
      # AOP mTLS toggle. verify-client "on" requires the cloudflare-origin-pull-ca
      # Secret; "off" = Full (Strict) TLS only. The auth-tls-secret is loaded by
      # nginx regardless of verify-client, so the CA Secret must always exist.
      nginx.ingress.kubernetes.io/auth-tls-verify-client: "off" # from-param: ${aop_verify_client}
      nginx.ingress.kubernetes.io/auth-tls-secret: "mattermost/cloudflare-origin-pull-ca"
      nginx.ingress.kubernetes.io/auth-tls-verify-depth: "1"
      nginx.ingress.kubernetes.io/ssl-redirect: "true"

  database:
    external:
      secret: mattermost-db

  fileStore:
    external:
      url: storage.googleapis.com
      bucket: "from-deploy-parameters" # from-param: ${filestore_bucket}
      secret: mattermost-filestore

  scheduling:
    nodeSelector:
      tier: prod
    tolerations:
      - key: dedicated
        operator: Equal
        value: prod
        effect: NoSchedule
    resources:
      requests:
        cpu: 250m
        memory: 512Mi
      limits:
        cpu: "1"
        memory: 1Gi
