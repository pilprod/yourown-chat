# Prod Mattermost external filestore Secret (GCS S3-compatible HMAC keys).
#
# Values are the Terraform-written `mattermost-storage-access-key` /
# `mattermost-storage-secret-key` Secret Manager secrets (created at storage
# init), injected by Cloud Deploy from deploy parameters — no plaintext in git.
# The operator CR references it as spec.fileStore.external.secret:
# mattermost-filestore (keys accesskey / secretkey).
#
# Rendered directly (not via CSI/secretObjects) because the managed GKE Secret
# Manager add-on cannot sync secrets into Kubernetes Secret objects.
apiVersion: v1
kind: Secret
metadata:
  name: mattermost-filestore
  namespace: mattermost
  labels:
    app: mattermost
type: Opaque
stringData:
  accesskey: "from-deploy-parameters" # from-param: ${mattermost_storage_access_key}
  secretkey: "from-deploy-parameters" # from-param: ${mattermost_storage_secret_key}
