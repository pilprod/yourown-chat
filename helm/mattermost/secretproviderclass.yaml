# Pulls the Cloudflare origin-protection material from Secret Manager for the
# Mattermost Ingress:
#   - mattermost-origin-tls     -> tls.crt/tls.key          (Ingress tlsSecret)
#   - cloudflare-origin-pull-ca -> ca.crt                   (Ingress auth-tls mTLS)
#
# The DB connection string (mattermost-db) and GCS HMAC keys (mattermost-filestore)
# are NO LONGER materialised here: they are rendered directly into Kubernetes
# Secrets from Cloud Deploy deploy parameters (helm/mattermost/db-secret.yaml,
# filestore-secret.yaml), because the MANAGED GKE Secret Manager add-on cannot
# sync secretObjects into Kubernetes Secrets.
#
# ⚠️ KNOWN GAP: for the same reason, the two origin-TLS secretObjects below will
# NOT materialise under the managed add-on either. Ingress TLS/AOP therefore
# still needs migrating (render from the cloudflare stack's secrets, or install
# the OSS Secrets Store CSI driver). Until then this SPC + the secret-sync
# Deployment are a no-op placeholder for the ingress secrets.
apiVersion: secrets-store.csi.x-k8s.io/v1
kind: SecretProviderClass
metadata:
  name: mattermost-gcp
  namespace: mattermost
spec:
  provider: gke
  parameters:
    secrets: |
      # Cloudflare origin-protection material (populated out-of-band):
      - resourceName: "projects/yourown-chat/secrets/mattermost-origin-tls-cert/versions/latest"
        path: "origin-tls-cert"
      - resourceName: "projects/yourown-chat/secrets/mattermost-origin-tls-key/versions/latest"
        path: "origin-tls-key"
      - resourceName: "projects/yourown-chat/secrets/cloudflare-origin-pull-ca/versions/latest"
        path: "origin-pull-ca"
  secretObjects:
    # Origin TLS keypair (Cloudflare Origin CA) served by ingress-nginx for the
    # Mattermost Ingress -> Cloudflare Full (Strict).
    - secretName: mattermost-origin-tls
      type: kubernetes.io/tls
      data:
        - objectName: origin-tls-cert
          key: tls.crt
        - objectName: origin-tls-key
          key: tls.key
    # CA that signs the client cert Cloudflare presents for Authenticated Origin
    # Pulls; ingress-nginx auth-tls-secret validates callers against it (mTLS).
    - secretName: cloudflare-origin-pull-ca
      type: Opaque
      data:
        - objectName: origin-pull-ca
          key: ca.crt
