# Pulls the Cloud SQL connection URI, GCS filestore HMAC keys and the Cloudflare
# origin-protection material from Secret Manager (via the GKE Secret Manager CSI
# add-on) and materialises them as Kubernetes Secrets the Mattermost operator and
# ingress-nginx consume:
#   - mattermost-db             -> DB_CONNECTION_STRING     (spec.database.external)
#   - mattermost-filestore      -> accesskey/secretkey      (spec.fileStore.external)
#   - mattermost-origin-tls     -> tls.crt/tls.key          (Ingress tlsSecret)
#   - cloudflare-origin-pull-ca -> ca.crt                   (Ingress auth-tls mTLS)
#
# secretObjects are only materialised while a pod mounts this volume — the
# secret-sync Deployment keeps that mount alive because operator-managed pods
# don't mount the CSI volume themselves.
#
# Replace REPLACE-ME-PROJECT and confirm the secret IDs against the Terraform
# outputs (cloudsql_connection_secret_id, filestore_*_secret_id).
apiVersion: secrets-store.csi.x-k8s.io/v1
kind: SecretProviderClass
metadata:
  name: mattermost-gcp
  namespace: mattermost
spec:
  provider: gcp
  parameters:
    secrets: |
      - resourceName: "projects/REPLACE-ME-PROJECT/secrets/cloudsql-mattermost-connection/versions/latest"
        path: "db-connection"
      - resourceName: "projects/REPLACE-ME-PROJECT/secrets/filestore-access-key/versions/latest"
        path: "filestore-access-key"
      - resourceName: "projects/REPLACE-ME-PROJECT/secrets/filestore-secret-key/versions/latest"
        path: "filestore-secret-key"
      # Cloudflare origin-protection material (populated out-of-band):
      - resourceName: "projects/REPLACE-ME-PROJECT/secrets/mattermost-origin-tls-cert/versions/latest"
        path: "origin-tls-cert"
      - resourceName: "projects/REPLACE-ME-PROJECT/secrets/mattermost-origin-tls-key/versions/latest"
        path: "origin-tls-key"
      - resourceName: "projects/REPLACE-ME-PROJECT/secrets/cloudflare-origin-pull-ca/versions/latest"
        path: "origin-pull-ca"
  secretObjects:
    - secretName: mattermost-db
      type: Opaque
      data:
        - objectName: db-connection
          key: DB_CONNECTION_STRING
    - secretName: mattermost-filestore
      type: Opaque
      data:
        - objectName: filestore-access-key
          key: accesskey
        - objectName: filestore-secret-key
          key: secretkey
    # Origin TLS keypair (Cloudflare Origin CA) served by ingress-nginx for the
    # Mattermost Ingress -> Cloudflare Full (Strict).
    - secretName: mattermost-origin-tls
      type: kubernetes.io/tls
      data:
        - objectName: origin-tls-cert
          key: tls.crt
        - objectName: origin-tls-key
          key: tls.key
    # CA that signs the client cert Cloudflare presents for Authenticated Origin
    # Pulls; ingress-nginx auth-tls-secret validates callers against it (mTLS).
    - secretName: cloudflare-origin-pull-ca
      type: Opaque
      data:
        - objectName: origin-pull-ca
          key: ca.crt
