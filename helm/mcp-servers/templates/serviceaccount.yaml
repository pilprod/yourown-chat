{{- if .Values.serviceAccount.create }}
# Shared Workload Identity KSA for MCP servers that need keyless GCP access
# (e.g. the google-cloud server's Logging/Monitoring reads). Bound to the `mcp`
# GSA created by the platform stack (workload_identity_mcp); the annotation
# value is injected per release by the Cloud Deploy deploy parameter mcp_gsa.
# Servers opt in via servers.<name>.serviceAccountName.
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ .Values.serviceAccount.name }}
  labels:
    app.kubernetes.io/part-of: mcp-servers
  annotations:
    iam.gke.io/gcp-service-account: "from-deploy-parameters" # from-param: ${mcp_gsa}
{{- end }}
