{{- if .Values.serviceAccount.create }}
# Shared Workload Identity KSA for servers needing keyless GCP access, bound to
# the platform `mcp` GSA. Annotation value injected via the mcp_gsa deploy
# parameter; servers opt in with servers.<name>.serviceAccountName.
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ .Values.serviceAccount.name }}
  labels:
    app.kubernetes.io/part-of: mcp-servers
  annotations:
    iam.gke.io/gcp-service-account: "from-deploy-parameters" # from-param: ${mcp_gsa}
{{- end }}
