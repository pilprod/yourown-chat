{{- range $name, $server := .Values.servers }}
{{- if $server.enabled }}
---
apiVersion: v1
kind: Service
metadata:
  name: mcp-{{ $name }}
  labels:
    app: mcp-{{ $name }}
    app.kubernetes.io/part-of: mcp-servers
spec:
  type: ClusterIP
  ports:
    - port: {{ $server.port }}
      targetPort: http
      protocol: TCP
      name: http
  selector:
    app: mcp-{{ $name }}
{{- end }}
{{- end }}
