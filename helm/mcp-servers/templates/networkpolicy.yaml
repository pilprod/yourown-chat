{{- range $name, $server := .Values.servers }}
{{- if $server.enabled }}
{{- $np := $.Values.defaults.networkPolicy }}
{{- if $server.networkPolicy }}{{ $np = $server.networkPolicy }}{{ end }}
{{- if $np.enabled }}
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: mcp-{{ $name }}-ingress
  labels:
    app: mcp-{{ $name }}
    app.kubernetes.io/part-of: mcp-servers
spec:
  podSelector:
    matchLabels:
      app: mcp-{{ $name }}
  policyTypes:
    - Ingress
  ingress:
    - from:
        {{- range $ns := $np.allowedNamespaces }}
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: {{ $ns | quote }}
        {{- end }}
      ports:
        - protocol: TCP
          port: {{ $server.port }}
{{- end }}
{{- end }}
{{- end }}
