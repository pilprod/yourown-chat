# In-cluster MCP servers, one entry per server under `servers:`. Each enabled
# entry renders a Deployment + ClusterIP Service (+ NetworkPolicy) named
# mcp-<key>. This file is the per-server switchboard; the whole set is gated by
# the app-gcp stack's mcp_servers_enabled (appends the mcp-servers Skaffold
# profile to the prod stage).
#
# CONVENTIONS
#   * Servers run in the `mattermost` namespace and are reachable ONLY from
#     that namespace (NetworkPolicy below): the consumer is the Mattermost
#     agent runtime, never the public internet. In-cluster URL:
#     http://mcp-<key>.mattermost.svc.cluster.local:<port><endpoint>.
#   * Transport must be HTTP-based (streamable-http or SSE). stdio-only
#     community servers need a gateway wrapper image (e.g. supergateway) --
#     wrap first, then add an entry.
#   * CREDENTIALS never live here. Following the platform's secret path
#     (Terraform -> Secret Manager -> K8s Secret directly in etcd), set
#     `secretEnvFrom: <secret-name>` and create the Secret via the app-gcp
#     cluster_secrets component. No secret ever passes through Cloud Deploy.
#   * Vendor-HOSTED remote MCP endpoints (Figma, Miro, Cloudflare, Atlassian,
#     ...) are NOT deployed here -- agents connect to the vendor URL with
#     OAuth. See docs/MCP.md for the full integration matrix.

tunnel:
  # Cloudflare Tunnel connector for Zero Trust access from personal MCP
  # clients (Claude) to the INTERNAL servers -- see docs/MCP.md. FLAGGED OFF
  # until the claude.ai <-> MCP-portal smoke test passes; enable together with
  # zero_trust_enabled in BOTH stacks (cloudflare first: it creates the
  # Secret Manager tunnel token this pod's mcp-tunnel Secret is built from).
  enabled: false
  image:
    repository: cloudflare/cloudflared
    # TODO pin after first rollout (rolling upstream tag).
    tag: "latest"
  secretEnvFrom: mcp-tunnel

serviceAccount:
  # Shared KSA bound (via Workload Identity) to the platform stack's `mcp` GSA
  # -- keyless, read-only observability access. Servers opt in with
  # servers.<name>.serviceAccountName; the rest run under the namespace default.
  create: true
  name: mcp-servers

defaults:
  # Prod node pool + taint toleration: MCP servers serve the prod Mattermost.
  nodeSelector:
    tier: prod
  tolerations:
    - key: dedicated
      operator: Equal
      value: prod
      effect: NoSchedule

  podSecurityContext:
    runAsNonRoot: true
    runAsUser: 65532
    runAsGroup: 65532
    fsGroup: 65532

  securityContext:
    allowPrivilegeEscalation: false
    readOnlyRootFilesystem: true
    capabilities:
      drop:
        - ALL

  resources:
    limits:
      cpu: 100m
      memory: 128Mi
    requests:
      cpu: 100m
      memory: 128Mi

  networkPolicy:
    enabled: true
    # Namespaces whose pods may reach an MCP server (one from-entry each).
    # Default: only the mattermost namespace (the Agents plugin is the
    # consumer). Servers with a public OAuth ingress add "ingress-nginx".
    allowedNamespaces:
      - mattermost

servers:
  # --- HashiCorp Terraform MCP server ----------------------------------------
  # Official image. Two capability tiers in one server:
  #   * public Terraform Registry lookups (providers/modules) -- no credentials;
  #   * HCP Terraform (app.terraform.io) -- workspaces/runs/stacks data and
  #     operations, enabled by TFE_TOKEN from the mcp-terraform-hcp Secret
  #     (Terraform-created; seeded placeholder until a real HCP team token is
  #     loaded out-of-band, see docs/MCP.md). One shared token = one shared
  #     identity: scope it to the yourown-chat HCP project, least privilege.
  # In streamable-http mode the server takes the target address ONLY from the
  # server-side TFE_ADDRESS env (header/query overrides are rejected with 403),
  # so chat input cannot repoint it at a different Terraform instance.
  terraform:
    enabled: true
    image:
      repository: hashicorp/terraform-mcp-server
      tag: "0.5.2"
      pullPolicy: IfNotPresent
    port: 8080
    env:
      TRANSPORT_MODE: streamable-http
      TRANSPORT_HOST: 0.0.0.0
      TRANSPORT_PORT: "8080"
      MCP_ENDPOINT: /mcp
      MCP_ALLOWED_ORIGINS: "https://yourown.chat"
      TFE_ADDRESS: "https://app.terraform.io"
    secretEnvFrom: mcp-terraform-hcp
    health:
      path: /health

  # --- Google Cloud observability (Cloud Logging / Monitoring / Trace) -------
  # Community server @krzko/google-cloud-mcp (stdio-only), wrapped by
  # supergateway into streamable-http. AUTH IS KEYLESS: the pod runs under the
  # mcp-servers KSA -> Workload Identity -> `mcp` GSA with logging.viewer /
  # monitoring.viewer / cloudtrace.user (platform stack workload_identity_mcp);
  # ADC inside the container resolves via the GKE metadata server -- no key,
  # no secret. readOnlyRootFilesystem is off for this server only: npx
  # materialises the package into $HOME at start.
  google-cloud:
    enabled: true
    serviceAccountName: mcp-servers
    image:
      repository: supercorp/supergateway
      # TODO pin after first rollout (docker pull + digest); upstream publishes
      # rolling tags only.
      tag: "latest"
    port: 8080
    args:
      - "--stdio"
      - "npx -y @krzko/google-cloud-mcp"
      - "--outputTransport"
      - "streamableHttp"
      - "--port"
      - "8080"
      - "--healthEndpoint"
      - "/healthz"
    env:
      GOOGLE_CLOUD_PROJECT: "yourown-chat"
      HOME: /tmp
      NPM_CONFIG_CACHE: /tmp/.npm
    securityContext:
      allowPrivilegeEscalation: false
      readOnlyRootFilesystem: false
      capabilities:
        drop:
          - ALL
    resources:
      requests:
        cpu: 100m
        memory: 256Mi
      limits:
        cpu: 500m
        memory: 512Mi
    health:
      path: /healthz

  # --- Google Workspace (Gmail + Calendar) -----------------------------------
  # Community server (taylorwilsdon/google_workspace_mcp), native
  # streamable-http, running in OAuth 2.1 MULTI-USER mode: each Mattermost user
  # clicks Connect in Agents, passes the Google consent under their OWN account,
  # and every tool call runs with that user's token -- users only ever see
  # their own mail/calendar. No port-forward, no shared mailbox identity.
  #
  # The user's browser must reach the server's OAuth endpoints, so this entry
  # carries an ingress (https://mcp-google-workspace.yourown.chat via the same
  # Cloudflare edge; wildcard Origin CA cert) and admits ingress-nginx in its
  # NetworkPolicy. The MCP endpoint stays OAuth-protected (401 without a
  # bearer token). The OAuth CLIENT id/secret arrive from the Terraform-created
  # mcp-google-workspace-oauth Secret (placeholders seeded; load real values
  # out-of-band, see docs/MCP.md).
  google-workspace:
    enabled: true
    image:
      repository: ghcr.io/taylorwilsdon/google_workspace_mcp
      # TODO pin after first rollout (rolling upstream tag).
      tag: "latest"
    port: 8000
    args:
      - "--transport"
      - "streamable-http"
      - "--tools"
      - "gmail"
      - "calendar"
    env:
      WORKSPACE_MCP_PORT: "8000"
      HOME: /tmp
      # OAuth 2.1 multi-user: the server issues/validates per-user bearer
      # tokens (MCP spec authorization) instead of one process-wide account.
      MCP_ENABLE_OAUTH21: "true"
      # Public base for the advertised OAuth endpoints (authorize/callback URLs
      # the browser hits). TLS terminates at ingress-nginx; the pod itself
      # speaks plain http, hence OAUTHLIB_INSECURE_TRANSPORT.
      WORKSPACE_EXTERNAL_URL: "https://mcp-google-workspace.yourown.chat"
      OAUTHLIB_INSECURE_TRANSPORT: "1"
    secretEnvFrom: mcp-google-workspace-oauth
    ingress:
      host: mcp-google-workspace.yourown.chat
      tlsSecret: mattermost-origin-tls
    networkPolicy:
      enabled: true
      allowedNamespaces:
        - mattermost
        - ingress-nginx
    securityContext:
      allowPrivilegeEscalation: false
      # The server persists OAuth grants under $HOME.
      readOnlyRootFilesystem: false
      capabilities:
        drop:
          - ALL
