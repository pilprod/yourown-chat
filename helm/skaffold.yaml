# Skaffold config consumed by Cloud Deploy to render and apply the platform's
# Kubernetes workloads. The app-gcp Terraform stack binds the dev and prod
# targets to the profiles below and appends mcp-servers to prod when enabled.
apiVersion: skaffold/v4beta11
kind: Config
metadata:
  name: yourown-chat

deploy:
  kubectl: {}

profiles:
  # Dev tenant. Namespaces, Secrets, and RBAC are owned by Terraform.
  - name: dev
    manifests:
      rawYaml:
        - developing/serviceaccount.yaml
        - developing/networkpolicy.yaml
        - developing/postgres.yaml
        - developing/mattermost-dev.yaml
    verify:
      - name: smoke-test
        container:
          name: smoke-test
          image: curlimages/curl:8.10.1
          command: ["/bin/sh", "-c"]
          args:
            - >-
              curl -sSf --retry 30 --retry-connrefused --retry-delay 5
              http://dev-mattermost.dev.svc.cluster.local:8065/api/v4/system/ping
        executionMode:
          kubernetesCluster:
            jobManifestPath: developing/verify/job.yaml

  # Optional bridge appended by the app-gcp clouddeploy component when enabled.
  - name: matterbridge
    patches:
      - op: add
        path: /manifests/rawYaml/-
        value: matterbridge/serviceaccount.yaml
      - op: add
        path: /manifests/rawYaml/-
        value: matterbridge/secretproviderclass.yaml
      - op: add
        path: /manifests/rawYaml/-
        value: matterbridge/networkpolicy.yaml
      - op: add
        path: /manifests/rawYaml/-
        value: matterbridge/deployment.yaml

  # Production Mattermost workload promoted after the approval gate.
  - name: prod
    manifests:
      rawYaml:
        - mattermost/serviceaccount.yaml
        - mattermost/mattermost.yaml

  # In-cluster MCP servers, appended to prod by the app-gcp clouddeploy
  # component when mcp_servers_enabled = true. ONE values-driven chart renders
  # every enabled server (helm/mcp-servers/values.yaml is the per-server
  # switchboard). Helm is used only to render; Cloud Deploy applies hydrated
  # YAML. Must be listed AFTER prod: the patch targets /manifests, which exists
  # only once the prod profile has populated it.
  - name: mcp-servers
    patches:
      - op: add
        path: /manifests/helm
        value:
          releases:
            - name: mcp-servers
              chartPath: mcp-servers
              namespace: mattermost
              createNamespace: false
              valuesFiles:
                - mcp-servers/values.yaml
