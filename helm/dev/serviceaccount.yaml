# Workload Identity SA for the dev tenant (in-cluster Postgres + dev Mattermost).
# Replace with the Terraform output `workload_identity_emails["dev"]`.
#
# Hardening: automountServiceAccountToken is false because neither the dev
# Postgres StatefulSet nor the dev Mattermost Deployment calls the Kubernetes
# API, so they must not carry a mounted API token (least privilege / smaller
# attack surface). This does NOT affect GKE Workload Identity (the metadata
# server issues GSA tokens independently of the default SA token) nor the
# Secret Manager CSI driver (it requests a scoped token via TokenRequest).
apiVersion: v1
kind: ServiceAccount
metadata:
  name: dev-app
  namespace: dev
  annotations:
    iam.gke.io/gcp-service-account: "REPLACE-ME-yourown-chat-dev@REPLACE-ME-PROJECT.iam.gserviceaccount.com"
automountServiceAccountToken: false
---
# Pulls the generated dev Postgres password from Secret Manager. Postgres reads
# it as a file (POSTGRES_PASSWORD_FILE) to avoid a Secret-materialisation race;
# secretObjects also mirrors it into a Secret so dev Mattermost can build its
# datasource via secretKeyRef.
apiVersion: secrets-store.csi.x-k8s.io/v1
kind: SecretProviderClass
metadata:
  name: dev-gcp
  namespace: dev
spec:
  provider: gcp
  parameters:
    secrets: |
      - resourceName: "projects/REPLACE-ME-PROJECT/secrets/yourown-chat-dev-postgres-password/versions/latest"
        path: "postgres-password"
  secretObjects:
    - secretName: dev-postgres
      type: Opaque
      data:
        - objectName: postgres-password
          key: POSTGRES_PASSWORD
