# ---------------------------------------------------------------------------
# Namespace-scoped RBAC for the dev tenant.
#
# Human access: the dev team is granted edit-level rights ONLY inside the `dev`
# namespace via a namespaced Role + RoleBinding. There is deliberately no
# ClusterRole/ClusterRoleBinding here, so the dev team cannot read or change
# anything in the prod (mattermost / matterbridge) namespaces or any
# cluster-scoped resource. This is the RBAC half of the dev/prod isolation that
# complements the NetworkPolicies in networkpolicy.yaml.
#
# PREREQUISITE for the `Group` subject: binding a Google Group requires "Google
# Groups for GKE RBAC" on the cluster (authenticator_groups_config with the
# gke-security-groups@<domain> group). If that is not enabled, replace the
# Group subject with one or more `kind: User` subjects (individual Google
# identities). Either way, set the real principal(s) before applying.
# ---------------------------------------------------------------------------
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: dev-tenant
  namespace: dev
rules:
  # Core workload + config objects the dev team operates on day to day.
  - apiGroups: [""]
    resources:
      - pods
      - pods/log
      - pods/exec
      - pods/portforward
      - services
      - endpoints
      - configmaps
      - secrets
      - persistentvolumeclaims
      - events
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: ["apps"]
    resources:
      - deployments
      - statefulsets
      - replicasets
      - daemonsets
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: ["batch"]
    resources:
      - jobs
      - cronjobs
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: dev-tenant
  namespace: dev
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: dev-tenant
subjects:
  # Replace with the real dev-team Google Group (or individual kind: User
  # subjects if Google Groups for GKE RBAC is not enabled). Scoped to ns dev.
  - apiGroup: rbac.authorization.k8s.io
    kind: Group
    name: "REPLACE-ME-dev-team@example.com"
