projectId: gcloud-production-1

mattermost:
  image:
    repository: southamerica-east1-docker.pkg.dev/gcloud-production-1/mattermost/mattermost
    pullPolicy: Always

instances:
  prod:
    enabled: true
    name: yourown-chat
    imageTag: v11.8.1-patched
    imageDigest: ""
    resources:
      requests:
        cpu: 80m
        memory: 512Mi
      limits:
        cpu: "2"
        memory: 3Gi
    env:
      - name: MM_SERVICESETTINGS_SITEURL
        value: https://yourown.chat
      - name: MM_FILESETTINGS_AMAZONS3SSE
        value: "true"
      - name: MM_FILESETTINGS_AMAZONS3SSL
        value: "true"
      - name: MM_SERVICESETTINGS_ENABLEMULTIFACTORAUTHENTICATION
        value: "true"
      - name: MM_SERVICESETTINGS_ENFORCEMULTIFACTORAUTHENTICATION
        value: "true"
      - name: MM_SERVICESETTINGS_ENABLEUSERACCESSTOKENS
        value: "false"
      - name: MM_TEAMSETTINGS_TEAMMATENAMEDISPLAY
        value: full_name
      - name: MM_TEAMSETTINGS_LOCKTEAMMATENAMEDISPLAY
        value: "true"
      - name: MM_EMAILSETTINGS_ENABLEPUSHNOTIFICATIONS
        value: "true"
      - name: MM_EMAILSETTINGS_PUSHNOTIFICATIONCONTENTS
        value: full
      - name: MM_SERVICESETTINGS_ENABLEINCOMINGWEBHOOKS
        value: "true"
      - name: MM_SERVICESETTINGS_ENFORCEINCOMINGWEBHOOKCHANNELLOCKING
        value: "true"
      - name: MM_SERVICESETTINGS_ENABLEOUTGOINGWEBHOOKS
        value: "true"
      - name: MM_SERVICESETTINGS_ENABLECOMMANDS
        value: "false"
      - name: MM_SERVICESETTINGS_ENABLEPOSTUSERNAMEOVERRIDE
        value: "true"
      - name: MM_SERVICESETTINGS_ENABLEPOSTICONOVERRIDE
        value: "true"
      - name: MM_SERVICESETTINGS_ENABLEBOTACCOUNTCREATION
        value: "true"
      - name: MM_SERVICESETTINGS_DISABLEBOTSWHENOWNERISDEACTIVATED
        value: "true"
    fileStore:
      type: s3
      bucketName: gcloud-production-1-mattermost-southamerica-east1
      s3Secret: s3-credentials
    ingress:
      name: mattermost
      host: yourown.chat
      tlsSecret: yourown-chat-tls
    database:
      secret: postgres-connection
      externalSecret:
        enabled: true
        datasourceSecretId: mattermost-db-datasource
  dev:
    enabled: true
    name: yourown-chat-dev
    imageTag: v11.8.1-patched-dev
    imageDigest: ""
    resources:
      requests:
        cpu: 20m
        memory: 512Mi
      limits:
        cpu: "1"
        memory: 2Gi
    env:
      - name: MM_SERVICESETTINGS_SITEURL
        value: https://dev.yourown.chat
      - name: MM_SERVICESETTINGS_ENABLEMULTIFACTORAUTHENTICATION
        value: "true"
      - name: MM_SERVICESETTINGS_ENFORCEMULTIFACTORAUTHENTICATION
        value: "true"
      - name: MM_SERVICESETTINGS_ENABLEUSERACCESSTOKENS
        value: "false"
      - name: MM_TEAMSETTINGS_TEAMMATENAMEDISPLAY
        value: full_name
      - name: MM_TEAMSETTINGS_LOCKTEAMMATENAMEDISPLAY
        value: "true"
      - name: MM_EMAILSETTINGS_ENABLEPUSHNOTIFICATIONS
        value: "true"
      - name: MM_EMAILSETTINGS_PUSHNOTIFICATIONCONTENTS
        value: full
      - name: MM_SERVICESETTINGS_ENABLEINCOMINGWEBHOOKS
        value: "true"
      - name: MM_SERVICESETTINGS_ENFORCEINCOMINGWEBHOOKCHANNELLOCKING
        value: "true"
      - name: MM_SERVICESETTINGS_ENABLEOUTGOINGWEBHOOKS
        value: "true"
      - name: MM_SERVICESETTINGS_ENABLECOMMANDS
        value: "false"
      - name: MM_SERVICESETTINGS_ENABLEPOSTUSERNAMEOVERRIDE
        value: "true"
      - name: MM_SERVICESETTINGS_ENABLEPOSTICONOVERRIDE
        value: "true"
      - name: MM_SERVICESETTINGS_ENABLEBOTACCOUNTCREATION
        value: "true"
      - name: MM_SERVICESETTINGS_DISABLEBOTSWHENOWNERISDEACTIVATED
        value: "true"
    fileStore:
      type: local
      storageSize: 20Gi
      accessModes:
        - ReadWriteOnce
    ingress:
      name: mattermost-dev
      host: dev.yourown.chat
      tlsSecret: yourown-chat-dev-tls
    database:
      secret: postgres-connection-dev
      externalSecret:
        enabled: false

externalSecrets:
  storeName: gcp-secret-manager
  s3:
    enabled: true
    accessKeySecretId: mattermost-s3-access-key
    secretKeySecretId: mattermost-s3-secret-key
  database:
    enabled: true
  matterbridge:
    enabled: false

devPostgres:
  enabled: true
  name: mattermost-dev-postgres
  secretName: postgres-connection-dev
  image: postgres:16-alpine
  database: mattermost
  user: mmuser
  storageSize: 10Gi
  resources:
    requests:
      cpu: 50m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 512Mi

matterbridge:
  enabled: false
  localMattermostName: yourown-chat
  image: 42wim/matterbridge:1.26.0
