# Service account for the dev tenant (in-cluster Postgres + dev Mattermost).
#
# Hardening: automountServiceAccountToken is false because neither the dev
# Postgres StatefulSet nor the dev Mattermost Deployment calls the Kubernetes
# API, so they must not carry a mounted API token (least privilege / smaller
# attack surface). This does NOT affect GKE Workload Identity (the metadata
# server issues GSA tokens independently of the default SA token).
#
# The dev Postgres password is delivered as the dev-postgres Kubernetes Secret
# (postgres-secret.yaml), rendered by Cloud Deploy from a Terraform deploy
# parameter — the dev tenant does not use the Secret Manager CSI mount, because
# the managed GKE add-on cannot sync secretObjects to a Kubernetes Secret.
apiVersion: v1
kind: ServiceAccount
metadata:
  name: dev-app
  namespace: dev
  annotations:
    iam.gke.io/gcp-service-account: "from-deploy-parameters" # from-param: ${mattermost_dev_gsa}
automountServiceAccountToken: false
