# In-cluster Postgres for the dev tenant (no managed Cloud SQL cost in dev).
# 5Gi PVC, pinned to the dev node pool. The password comes from the dev-postgres
# Kubernetes Secret (postgres-secret.yaml), which Cloud Deploy fills from the
# Terraform-generated dev_postgres_password deploy parameter — never a git
# literal. (The managed GKE Secret Manager add-on can't sync secretObjects to a
# Kubernetes Secret, so dev uses a deploy-parameter-rendered Secret, not CSI.)
apiVersion: v1
kind: Service
metadata:
  name: dev-postgres
  namespace: dev
  labels:
    app: dev-postgres
spec:
  clusterIP: None
  selector:
    app: dev-postgres
  ports:
    - name: postgres
      port: 5432
      targetPort: 5432
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: dev-postgres
  namespace: dev
spec:
  serviceName: dev-postgres
  replicas: 1
  selector:
    matchLabels:
      app: dev-postgres
  template:
    metadata:
      labels:
        app: dev-postgres
    spec:
      serviceAccountName: dev-app
      nodeSelector:
        tier: dev
      containers:
        - name: postgres
          image: postgres:16-alpine
          env:
            - name: POSTGRES_USER
              value: mmuser
            - name: POSTGRES_DB
              value: mattermost
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: dev-postgres
                  key: POSTGRES_PASSWORD
            - name: PGDATA
              value: /var/lib/postgresql/data/pgdata
          ports:
            - containerPort: 5432
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi
          volumeMounts:
            - name: data
              mountPath: /var/lib/postgresql/data
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 5Gi
