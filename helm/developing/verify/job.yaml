# On-cluster verify Job TEMPLATE for the Cloud Deploy `dev` stage.
#
# This is NOT a workload. It is referenced by helm/skaffold.yaml (dev profile,
# verify.executionMode.kubernetesCluster.jobManifestPath); Skaffold deploys this
# Job with the `smoke-test` container replaced by the verify container defined in
# skaffold.yaml. It lives in this subdirectory so the manual fallback
# `kubectl apply -f dev/` (non-recursive) does NOT pick it up.
#
# It MUST run in namespace `dev`: the dev NetworkPolicy is default-deny and only
# admits intra-namespace traffic, so the probe can reach dev-mattermost (and
# resolve DNS) only from inside `dev`. No API access is needed, so the SA token
# is not mounted; with no nodeSelector/toleration it can only land on the
# untainted dev pool anyway (tier=dev is set for clarity).
apiVersion: batch/v1
kind: Job
metadata:
  name: dev-mattermost-smoke
  namespace: dev
spec:
  backoffLimit: 1
  ttlSecondsAfterFinished: 120
  template:
    spec:
      restartPolicy: Never
      automountServiceAccountToken: false
      nodeSelector:
        tier: dev
      containers:
        # Replaced by Skaffold with the verify container (name must match).
        - name: smoke-test
          image: curlimages/curl:8.10.1
