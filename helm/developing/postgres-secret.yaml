# dev Postgres password as a Kubernetes Secret.
#
# The value is the Terraform-generated `dev-postgres-password` (also stored in
# Secret Manager), injected here by Cloud Deploy from the `dev_postgres_password`
# deploy parameter at release time — no plaintext in git. Both the in-cluster
# Postgres (POSTGRES_PASSWORD) and dev Mattermost (secretKeyRef, expanded into
# the datasource) read this Secret.
#
# Why not the CSI mount / secretObjects? The cluster runs the MANAGED GKE Secret
# Manager add-on, which mounts secrets as files but does NOT support syncing to
# Kubernetes Secrets (secretObjects). So the dev tenant materialises this one
# credential via a deploy parameter instead; Cloud Deploy owns the dev namespace
# and this Secret in the same render, avoiding any Terraform<->cluster ordering.
apiVersion: v1
kind: Secret
metadata:
  name: dev-postgres
  namespace: dev
  labels:
    app: dev-postgres
type: Opaque
stringData:
  # Whole-value substitution (Cloud Deploy from-param replaces the entire field).
  POSTGRES_PASSWORD: "from-deploy-parameters" # from-param: ${dev_postgres_password}
