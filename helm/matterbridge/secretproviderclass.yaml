# The entire matterbridge.toml (which contains bot tokens/webhooks) is stored as
# a single Secret Manager secret and mounted as a file — no tokens ever live in
# a ConfigMap or in git. Terraform seeds a DEFAULT version (a disabled gateway
# pointing at the in-cluster prod Mattermost) so the pod starts on init instead
# of wedging in ContainerCreating. To go live, add a new version out-of-band with
# a real bot Token/Team and enable=true (versions/latest is what the pod mounts):
#   gcloud secrets versions add matterbridge-tokens --data-file=matterbridge.toml
apiVersion: secrets-store.csi.x-k8s.io/v1
kind: SecretProviderClass
metadata:
  name: matterbridge-gcp
  namespace: matterbridge
spec:
  provider: gke
  parameters:
    secrets: |
      - resourceName: "projects/yourown-chat/secrets/matterbridge-tokens/versions/latest"
        path: "matterbridge.toml"
