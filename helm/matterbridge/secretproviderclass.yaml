# The entire matterbridge.toml (which contains bot tokens/webhooks) is stored as
# a single Secret Manager secret and mounted as a file — no tokens ever live in
# a ConfigMap or in git. Populate the secret out-of-band, e.g.:
#   gcloud secrets versions add yourown-chat-prod-matterbridge-tokens --data-file=matterbridge.toml
# The pod stays in ContainerCreating until at least one secret version exists.
apiVersion: secrets-store.csi.x-k8s.io/v1
kind: SecretProviderClass
metadata:
  name: matterbridge-gcp
  namespace: matterbridge
spec:
  provider: gcp
  parameters:
    secrets: |
      - resourceName: "projects/REPLACE-ME-PROJECT/secrets/yourown-chat-prod-matterbridge-tokens/versions/latest"
        path: "matterbridge.toml"
