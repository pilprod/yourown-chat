# matterbridge is a low-priority integration workload on the shared node pool.
# Its config
# (with tokens) is mounted read-only from Secret Manager via the CSI volume.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: matterbridge
  namespace: matterbridge
  labels:
    app: matterbridge
spec:
  replicas: 1
  # matterbridge is a singleton bridge: two concurrent instances would both
  # connect to Mattermost and double-deliver messages. Recreate tears the old
  # pod down before starting the new one (no RollingUpdate surge to 2 pods).
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: matterbridge
  template:
    metadata:
      labels:
        app: matterbridge
    spec:
      serviceAccountName: matterbridge
      priorityClassName: development
      containers:
        - name: matterbridge
          # Pin to a digest/tag you trust rather than a moving tag.
          image: "42wim/matterbridge:1.26.0"
          args:
            - "-conf"
            - "/etc/matterbridge/matterbridge.toml"
          resources:
            requests:
              cpu: 25m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 128Mi
          volumeMounts:
            - name: config
              mountPath: /etc/matterbridge
              readOnly: true
      volumes:
        - name: config
          csi:
            driver: secrets-store-gke.csi.k8s.io
            readOnly: true
            volumeAttributes:
              secretProviderClass: matterbridge-gcp
