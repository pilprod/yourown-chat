# Workload Identity SA for matterbridge. Replace the annotation with the
# Terraform output `workload_identity_emails["matterbridge"]`.
apiVersion: v1
kind: ServiceAccount
metadata:
  name: matterbridge
  namespace: matterbridge
  annotations:
    iam.gke.io/gcp-service-account: "REPLACE-ME-matterbridge@REPLACE-ME-PROJECT.iam.gserviceaccount.com"
