# Workload Identity SA for matterbridge. Replace the annotation with the
# Terraform output `workload_identity_emails["matterbridge"]`.
apiVersion: v1
kind: ServiceAccount
metadata:
  name: matterbridge
  namespace: matterbridge
  annotations:
    iam.gke.io/gcp-service-account: "from-deploy-parameters" # from-param: ${matterbridge_gsa}
