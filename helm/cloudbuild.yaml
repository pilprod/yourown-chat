# MANUAL FALLBACK for cutting a Cloud Deploy release of the helm/ workloads.
# The stack's deploy_release component runs the same `gcloud deploy releases
# create` automatically on semver tags; this file documents that command for a
# manual run from any checkout. No image is built here (the image tag is the
# source of truth inside the manifests).

substitutions:
  _REGION: europe-west3
  # Choose `mattermost` or `mcp`. This fallback creates exactly one release.
  _PIPELINE: mattermost
  # The Terraform-managed releaser can target both component pipelines.
  _RELEASE_SA_EMAIL: releaser-europe-west3@${PROJECT_ID}.iam.gserviceaccount.com

serviceAccount: projects/${PROJECT_ID}/serviceAccounts/${_RELEASE_SA_EMAIL}

options:
  logging: CLOUD_LOGGING_ONLY
  dynamicSubstitutions: true

steps:
  - id: release
    name: gcr.io/google.com/cloudsdktool/cloud-sdk:slim
    dir: helm
    entrypoint: gcloud
    args:
      - deploy
      - releases
      - create
      - "rel-${SHORT_SHA}-${BUILD_ID}"
      - --project=${PROJECT_ID}
      - --region=${_REGION}
      - --delivery-pipeline=${_PIPELINE}
      # Uploads helm/ (skaffold.yaml + manifests); the pipeline's per-stage
      # Skaffold profile renders each target. No --images: the tag is in-manifest.
      - --source=.
