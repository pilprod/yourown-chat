# ingress-nginx controller for the prod cluster (the public edge). Installed
# automatically by the app-gcp cluster_bootstrap component (which renders
# templates/ingress-nginx-values.yaml.tftpl with the platform ingress IP --
# keep in sync); this file is the manual `helm upgrade --install` fallback.
# Defense in depth: L4 Cloudflare-only firewall (loadBalancerSourceRanges) +
# per-Ingress mTLS (mattermost.yaml auth-tls-*) + Full (Strict) TLS.
# Refresh Cloudflare ranges from cloudflare.com/ips-v4; keep this list
# IPv4-only (GKE's single firewall rule rejects mixed IPv4/IPv6 CIDRs).
controller:
  replicaCount: 1

  # Prod pool carries the dedicated=prod:NoSchedule taint, so the toleration is
  # required or the controller never schedules.
  nodeSelector:
    tier: prod
  tolerations:
    - key: dedicated
      operator: Equal
      value: prod
      effect: NoSchedule

  service:
    type: LoadBalancer
    loadBalancerIP: "REPLACE-ME-INGRESS-IP" # terraform output ingress_ip_address
    # Preserve the real L4 source IP (Cloudflare edge); avoid extra SNAT.
    externalTrafficPolicy: Local
    # GKE turns this into a GCP firewall admitting only Cloudflare. IPv4 only.
    loadBalancerSourceRanges:
      # Cloudflare IPv4 (https://www.cloudflare.com/ips-v4)
      - 173.245.48.0/20
      - 103.21.244.0/22
      - 103.22.200.0/22
      - 103.31.4.0/22
      - 141.101.64.0/18
      - 108.162.192.0/18
      - 190.93.240.0/20
      - 188.114.96.0/20
      - 197.234.240.0/22
      - 198.41.128.0/17
      - 162.158.0.0/15
      - 104.16.0.0/13
      - 104.24.0.0/14
      - 172.64.0.0/13
      - 131.0.72.0/22

  config:
    # Trust X-Forwarded-For only when the peer is Cloudflare (proxy-real-ip-cidr
    # = set_real_ip_from), so clients cannot spoof their source IP.
    use-forwarded-headers: "true"
    compute-full-forwarded-for: "true"
    proxy-real-ip-cidr: "173.245.48.0/20,103.21.244.0/22,103.22.200.0/22,103.31.4.0/22,141.101.64.0/18,108.162.192.0/18,190.93.240.0/20,188.114.96.0/20,197.234.240.0/22,198.41.128.0/17,162.158.0.0/15,104.16.0.0/13,104.24.0.0/14,172.64.0.0/13,131.0.72.0/22,2400:cb00::/32,2606:4700::/32,2803:f800::/32,2405:b500::/32,2405:8100::/32,2a06:98c0::/29,2c0f:f248::/32"

  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 256Mi
