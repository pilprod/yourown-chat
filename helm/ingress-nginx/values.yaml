# Helm values for the ingress-nginx controller on the PROD cluster.
#
# This is the public edge of the platform. It pins the Service to the reserved
# static IP (the Cloudflare-facing "white address") and admits ONLY Cloudflare
# source ranges at L4 -- GKE turns loadBalancerSourceRanges into a GCP firewall,
# so direct hits to the IP that don't originate from Cloudflare are dropped
# before they ever reach a node.
#
# Defense in depth (an IP allowlist alone is weak because Cloudflare's proxy IPs
# are shared across all their tenants):
#   1. L4  : loadBalancerSourceRanges = Cloudflare ranges (this file).
#   2. mTLS: Authenticated Origin Pulls, enforced per-Ingress by nginx
#            (helm/mattermost/mattermost.yaml auth-tls-* annotations).
#   3. TLS : Cloudflare Full (Strict) with a Cloudflare Origin CA cert served by
#            the Mattermost Ingress (tlsSecret mattermost-origin-tls).
#
# AUTOMATED INSTALL: the app-gcp stack's cluster_bootstrap component installs
# this release at cluster bootstrap, rendering
# terraform/app-gcp/modules/cluster-bootstrap/templates/ingress-nginx-values.yaml.tftpl
# with loadBalancerIP injected from the platform-published ingress IP (keep
# both files in sync). This file remains the MANUAL FALLBACK:
#   helm repo add ingress-nginx https://kubernetes.github.io/ingress-nginx
#   helm upgrade --install ingress-nginx ingress-nginx/ingress-nginx \
#     -n ingress-nginx --create-namespace -f helm/ingress-nginx/values.yaml
#
# Refresh Cloudflare ranges from https://www.cloudflare.com/ips-v4 and
# https://www.cloudflare.com/ips-v6 (see helm/ingress-nginx/README.md). Keep
# loadBalancerSourceRanges IPv4-only: GKE creates a single GCP firewall rule for
# the Service, and GCP rejects rules that mix IPv4 and IPv6 CIDRs.
controller:
  replicaCount: 1

  # Prod cluster has a single tier=prod node pool; keep the edge on it. The
  # pool carries the dedicated=prod:NoSchedule taint, so the selector needs
  # the matching toleration or the controller would never schedule.
  nodeSelector:
    tier: prod
  tolerations:
    - key: dedicated
      operator: Equal
      value: prod
      effect: NoSchedule

  service:
    type: LoadBalancer
    # From `terraform output ingress_ip_address` (network module reserves it).
    loadBalancerIP: "REPLACE-ME-INGRESS-IP"
    # Preserve the real L4 source IP (the Cloudflare edge) and avoid extra SNAT.
    externalTrafficPolicy: Local
    # Only Cloudflare may reach the origin. GKE programs a GCP firewall from this.
    # The reserved origin address is IPv4; do not mix IPv6 ranges into this list.
    loadBalancerSourceRanges:
      # Cloudflare IPv4 (https://www.cloudflare.com/ips-v4)
      - 173.245.48.0/20
      - 103.21.244.0/22
      - 103.22.200.0/22
      - 103.31.4.0/22
      - 141.101.64.0/18
      - 108.162.192.0/18
      - 190.93.240.0/20
      - 188.114.96.0/20
      - 197.234.240.0/22
      - 198.41.128.0/17
      - 162.158.0.0/15
      - 104.16.0.0/13
      - 104.24.0.0/14
      - 172.64.0.0/13
      - 131.0.72.0/22

  config:
    # Trust X-Forwarded-For, but ONLY when the immediate peer is Cloudflare, so a
    # client cannot spoof its source IP. proxy-real-ip-cidr = set_real_ip_from.
    use-forwarded-headers: "true"
    compute-full-forwarded-for: "true"
    proxy-real-ip-cidr: "173.245.48.0/20,103.21.244.0/22,103.22.200.0/22,103.31.4.0/22,141.101.64.0/18,108.162.192.0/18,190.93.240.0/20,188.114.96.0/20,197.234.240.0/22,198.41.128.0/17,162.158.0.0/15,104.16.0.0/13,104.24.0.0/14,172.64.0.0/13,131.0.72.0/22,2400:cb00::/32,2606:4700::/32,2803:f800::/32,2405:b500::/32,2405:8100::/32,2a06:98c0::/29,2c0f:f248::/32"

  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 256Mi
