apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "terraform-mcp-server.fullname" . }}
  labels:
    app: {{ include "terraform-mcp-server.name" . }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      app: {{ include "terraform-mcp-server.name" . }}
  template:
    metadata:
      labels:
        app: {{ include "terraform-mcp-server.name" . }}
    spec:
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      containers:
        - name: {{ .Chart.Name }}
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}
          env:
            - name: TRANSPORT_MODE
              value: {{ .Values.transport.mode | quote }}
            - name: TRANSPORT_HOST
              value: {{ .Values.transport.host | quote }}
            - name: TRANSPORT_PORT
              value: {{ .Values.service.port | quote }}
            - name: MCP_ENDPOINT
              value: {{ .Values.transport.endpoint | quote }}
            - name: MCP_ALLOWED_ORIGINS
              value: {{ .Values.transport.allowedOrigins | quote }}
          ports:
            - name: http
              containerPort: {{ .Values.service.port }}
              protocol: TCP
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 3
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 20
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
      nodeSelector:
        {{- toYaml .Values.nodeSelector | nindent 8 }}
      tolerations:
        {{- toYaml .Values.tolerations | nindent 8 }}
