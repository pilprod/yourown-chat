{{- if .Values.networkPolicy.enabled -}}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "terraform-mcp-server.fullname" . }}-allow-mattermost-prod
  labels:
    app: {{ include "terraform-mcp-server.name" . }}
spec:
  podSelector:
    matchLabels:
      app: {{ include "terraform-mcp-server.name" . }}
  policyTypes:
    - Ingress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              {{- range $key, $value := .Values.networkPolicy.allowedNamespaces }}
              {{ $key }}: {{ $value }}
              {{- end }}
          podSelector:
            matchLabels:
              {{- range $key, $value := .Values.networkPolicy.allowedPods }}
              {{ $key }}: {{ $value }}
              {{- end }}
      ports:
        - protocol: TCP
          port: {{ .Values.service.port }}
{{- end }}
