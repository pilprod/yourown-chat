replicaCount: 1

image:
  repository: hashicorp/terraform-mcp-server
  pullPolicy: IfNotPresent
  tag: "0.5.2"

service:
  type: ClusterIP
  port: 8080

transport:
  mode: streamable-http
  host: 0.0.0.0
  endpoint: /mcp
  allowedOrigins: "https://yourown.chat"

networkPolicy:
  enabled: true
  allowedNamespaces:
    kubernetes.io/metadata.name: "mattermost"
  # Empty means every pod in the explicitly allowed namespace. This avoids
  # coupling the policy to implementation-specific labels generated by the
  # Mattermost Operator.
  allowedPods: {}

podSecurityContext:
  runAsNonRoot: true
  runAsUser: 65532
  runAsGroup: 65532
  fsGroup: 65532

securityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: true
  capabilities:
    drop:
      - ALL

nodeSelector:
  tier: prod

tolerations:
  - key: dedicated
    operator: Equal
    value: prod
    effect: NoSchedule

resources:
  limits:
    cpu: 100m
    memory: 128Mi
  requests:
    cpu: 100m
    memory: 128Mi
