{{- range $name, $server := .Values.servers }}
{{- if $server.enabled }}
{{- $resourceName := include "mcp-servers.serverName" (dict "root" $ "name" $name) }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ $resourceName }}
  namespace: {{ $.Release.Namespace }}
  labels:
    app: {{ $resourceName }}
    app.kubernetes.io/part-of: mcp-servers
spec:
  type: ClusterIP
  ports:
    - port: {{ $server.port }}
      targetPort: http
      protocol: TCP
      name: http
  selector:
    app: {{ $resourceName }}
{{- end }}
{{- end }}
