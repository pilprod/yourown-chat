{{- if .Values.devCleanup.enabled }}
{{- range $name, $server := .Values.servers }}
{{- if $server.enabled }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: mcp-dev-cleanup
  namespace: {{ $.Release.Namespace }}
rules:
  - apiGroups: ["apps"]
    resources: ["deployments"]
    resourceNames:
      - {{ include "mcp-servers.serverName" (dict "root" $ "name" $name) }}
    verbs: ["get", "patch", "update"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: mcp-dev-cleanup
  namespace: {{ $.Release.Namespace }}
subjects:
  - kind: ServiceAccount
    name: {{ $.Values.devCleanup.serviceAccountName }}
    namespace: {{ $.Values.devCleanup.serviceAccountNamespace }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: mcp-dev-cleanup
{{- end }}
{{- end }}
{{- end }}
