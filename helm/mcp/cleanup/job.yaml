apiVersion: batch/v1
kind: Job
metadata:
  name: mcp-dev-cleanup
  namespace: mcp-tunnel
spec:
  backoffLimit: 1
  ttlSecondsAfterFinished: 120
  template:
    spec:
      serviceAccountName: mcp-dev-cleanup
      restartPolicy: Never
      priorityClassName: development
      containers:
        - name: cleanup
          image: bitnami/kubectl:1.33
