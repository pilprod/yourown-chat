# Pulls the Cloud SQL connection URI + GCS filestore HMAC keys from Secret
# Manager (via the GKE Secret Manager CSI add-on) and materialises them as two
# Kubernetes Secrets the Mattermost operator consumes:
#   - mattermost-db        -> key DB_CONNECTION_STRING  (spec.database.external)
#   - mattermost-filestore -> keys accesskey/secretkey  (spec.fileStore.external)
#
# secretObjects are only materialised while a pod mounts this volume — the
# secret-sync Deployment keeps that mount alive because operator-managed pods
# don't mount the CSI volume themselves.
#
# Replace REPLACE-ME-PROJECT and confirm the secret IDs against the Terraform
# outputs (cloudsql_connection_secret_id, filestore_*_secret_id).
apiVersion: secrets-store.csi.x-k8s.io/v1
kind: SecretProviderClass
metadata:
  name: mattermost-gcp
  namespace: mattermost
spec:
  provider: gcp
  parameters:
    secrets: |
      - resourceName: "projects/REPLACE-ME-PROJECT/secrets/ycs-prod-cloudsql-mattermost-connection/versions/latest"
        path: "db-connection"
      - resourceName: "projects/REPLACE-ME-PROJECT/secrets/ycs-prod-app-filestore-access-key/versions/latest"
        path: "filestore-access-key"
      - resourceName: "projects/REPLACE-ME-PROJECT/secrets/ycs-prod-app-filestore-secret-key/versions/latest"
        path: "filestore-secret-key"
  secretObjects:
    - secretName: mattermost-db
      type: Opaque
      data:
        - objectName: db-connection
          key: DB_CONNECTION_STRING
    - secretName: mattermost-filestore
      type: Opaque
      data:
        - objectName: filestore-access-key
          key: accesskey
        - objectName: filestore-secret-key
          key: secretkey
