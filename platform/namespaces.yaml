# Namespaces for the chat platform tenants.
# Labels drive scheduling intent and (optionally) network policy selectors.
apiVersion: v1
kind: Namespace
metadata:
  name: mattermost
  labels:
    tier: prod
    part-of: yourown-chat
---
apiVersion: v1
kind: Namespace
metadata:
  name: matterbridge
  labels:
    tier: dev
    part-of: yourown-chat
---
apiVersion: v1
kind: Namespace
metadata:
  name: dev
  labels:
    tier: dev
    part-of: yourown-chat
