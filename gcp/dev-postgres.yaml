apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: mattermost-dev-postgres
  namespace: mattermost
spec:
  serviceName: mattermost-dev-postgres
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: mattermost-dev-postgres
  template:
    metadata:
      labels:
        app.kubernetes.io/name: mattermost-dev-postgres
    spec:
      containers:
        - name: postgres
          image: postgres:16-alpine
          imagePullPolicy: IfNotPresent
          env:
            - name: POSTGRES_DB
              value: mattermost
            - name: POSTGRES_USER
              value: mmuser
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: postgres-connection-dev
                  key: DEV_POSTGRES_PASSWORD
          ports:
            - name: postgres
              containerPort: 5432
          readinessProbe:
            exec:
              command:
                - pg_isready
                - -U
                - mmuser
                - -d
                - mattermost
            initialDelaySeconds: 5
            periodSeconds: 5
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
          volumeMounts:
            - name: data
              mountPath: /var/lib/postgresql/data
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes:
          - ReadWriteOnce
        resources:
          requests:
            storage: 10Gi
---
apiVersion: v1
kind: Service
metadata:
  name: mattermost-dev-postgres
  namespace: mattermost
spec:
  selector:
    app.kubernetes.io/name: mattermost-dev-postgres
  ports:
    - name: postgres
      port: 5432
      targetPort: postgres