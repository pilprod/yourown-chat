steps:
  - name: gcr.io/google.com/cloudsdktool/google-cloud-cli:slim
    id: deploy-to-rke2
    entrypoint: bash
    args:
      - -ceu
      - |
        apt-get update
        apt-get install -y ca-certificates curl

        curl -fsSL -o /usr/local/bin/kubectl \
          "https://dl.k8s.io/release/$(curl -fsSL https://dl.k8s.io/release/stable.txt)/bin/linux/amd64/kubectl"
        chmod +x /usr/local/bin/kubectl

        curl -fsSL https://raw.githubusercontent.com/helm/helm/main/scripts/get-helm-3 | bash

        gcloud secrets versions access latest \
          --project="${_PROJECT_ID}" \
          --secret="${_KUBECONFIG_SECRET}" \
          >/tmp/kubeconfig.yaml

        export KUBECONFIG=/tmp/kubeconfig.yaml
        export PROJECT_ID="${_PROJECT_ID}"
        export IMAGE_REPO="${_IMAGE_REPO}"
        export BUCKET_NAME="${_BUCKET_NAME}"
        export SITE_URL="${_SITE_URL}"

        tag_name="${TAG_NAME}"
        ref_name="${REF_NAME}"
        image_tag="$${tag_name:-$${ref_name}}"
        version_pattern='^[^.]+\.[^.]+\.[^.]+$'

        if [[ -z "$${image_tag}" ]]; then
          echo "No tag ref found; skipping yourown-chat deploy for non-tag build." >&2
          exit 0
        fi

        if [[ ! "$${image_tag}" =~ $${version_pattern} ]]; then
          echo "Ref '$${image_tag}' does not match version tag pattern *.*.*; skipping yourown-chat deploy." >&2
          exit 0
        fi

        export IMAGE_TAG="$${image_tag}"

        bash gcp/deploy.sh

options:
  logging: CLOUD_LOGGING_ONLY

substitutions:
  _PROJECT_ID: gcloud-production-1
  _IMAGE_REPO: southamerica-east1-docker.pkg.dev/gcloud-production-1/mattermost/mattermost
  _IMAGE_TAG: latest
  _BUCKET_NAME: gcloud-production-1-mattermost-southamerica-east1
  _SITE_URL: https://yourown.chat
  _KUBECONFIG_SECRET: mattermost-rke2-kubeconfig