steps:
  - name: gcr.io/google.com/cloudsdktool/google-cloud-cli:slim
    id: deploy-to-rke2
    env:
      - PIPELINE_NAME=${_PIPELINE_NAME}
      - PIPELINE_PROJECT_ID=$PROJECT_ID
      - PIPELINE_BUILD_ID=$BUILD_ID
      - PIPELINE_CLOUDBUILD_REGION=${_CLOUDBUILD_REGION}
      - PIPELINE_GITHUB_REPO=https://github.com/pilprod/yourown-chat
      - PIPELINE_TAG=$TAG_NAME
      - PIPELINE_SHORT_SHA=$SHORT_SHA
      - MATTERMOST_SITE_URL=${_MATTERMOST_SITE_URL}
    entrypoint: bash
    secretEnv:
      - MATTERMOST_CICD_TOKEN_ID
      - MATTERMOST_CICD_TOKEN_SECRET
      - MATTERMOST_CICD_CHANNEL_ID
    args:
      - -ceu
      - |
        apt-get update
        apt-get install -y ca-certificates curl make python3 python3-yaml

        pipeline_started_at="$$(date -u +%s)"
        pipeline_tag="$${PIPELINE_TAG:-manual-or-untagged}"
        pipeline_github_repo="$${PIPELINE_GITHUB_REPO:-}"
        pipeline_project="$${pipeline_github_repo#https://github.com/}"
        pipeline_short_sha="$${PIPELINE_SHORT_SHA:-unknown-sha}"
        pipeline_build_id="$${PIPELINE_BUILD_ID:-unknown-build}"
        pipeline_project_id="$${PIPELINE_PROJECT_ID:-${_PROJECT_ID}}"
        pipeline_cloudbuild_region="$${PIPELINE_CLOUDBUILD_REGION:-southamerica-east1}"
        pipeline_name="$${PIPELINE_NAME:-Cloud Build}"
        if [[ -z "$${pipeline_project}" || "$${pipeline_project}" == "$${pipeline_github_repo}" ]]; then
          pipeline_project="$${pipeline_name}"
        fi
        pipeline_build_url="https://console.cloud.google.com/cloud-build/builds;region=$${pipeline_cloudbuild_region}/$${pipeline_build_id}?project=$${pipeline_project_id}"
        chart_repository="${_CHART_REPOSITORY}"
        chart_registry_path="$${chart_repository#oci://}"
        read_helm_value() {
          python3 -c 'import sys,yaml; data=yaml.safe_load(open(sys.argv[1])); value=data; [value := value[key] for key in sys.argv[2].split(".")]; print(value)' "$$1" "$$2"
        }
        pipeline_image_tag="$$(read_helm_value helm/yourown-chat/values.yaml instances.prod.imageTag)"
        pipeline_dev_image_tag="$$(read_helm_value helm/yourown-chat/values.yaml instances.dev.imageTag)"
        pipeline_chart_version="$${PIPELINE_TAG:-}"
        if [[ -z "$${pipeline_chart_version}" ]]; then
          pipeline_chart_version="$$(gcloud artifacts docker tags list "$${chart_registry_path}/yourown-chat" \
            --format='value(tag)' \
            | sed 's|.*/||' \
            | grep -E '^[0-9]+\.[0-9]+\.[0-9]+$$' \
            | sort -V \
            | tail -n 1)"
        fi
        if [[ ! "$${pipeline_chart_version}" =~ ^[0-9]+\.[0-9]+\.[0-9]+$$ ]]; then
          echo "Chart version must be numeric semver, got: $${pipeline_chart_version}" >&2
          exit 1
        fi

        artifact_link() {
          local artifact_ref="$$1"
          local display_label="$${2:-$${artifact_ref}}"
          local display_tag_pattern="$${3:-}"
          local artifact_repo="$${artifact_ref%:*}"
          local artifact_tag="$${artifact_ref##*:}"
          local artifact_host="$${artifact_repo%%/*}"
          local artifact_path="$${artifact_repo#*/}"
          local artifact_location="$${artifact_host%-docker.pkg.dev}"
          local artifact_project_id="$${artifact_path%%/*}"
          local artifact_path_remainder="$${artifact_path#*/}"
          local artifact_registry_repo="$${artifact_path_remainder%%/*}"
          local artifact_name="$${artifact_path_remainder#*/}"
          local artifact_digest
          artifact_digest="$$(gcloud artifacts docker images describe "$${artifact_ref}" --format='value(image_summary.digest)' 2>/dev/null || true)"

          local label="$${display_label}"
          local url="https://console.cloud.google.com/artifacts/docker/$${artifact_project_id}/$${artifact_location}/$${artifact_registry_repo}/$${artifact_name}/$${artifact_tag}?project=$${artifact_project_id}"
          if [[ -n "$${artifact_digest}" ]]; then
            url="https://console.cloud.google.com/artifacts/docker/$${artifact_project_id}/$${artifact_location}/$${artifact_registry_repo}/$${artifact_name}/$${artifact_digest}?project=$${artifact_project_id}"
            if [[ -n "$${display_tag_pattern}" ]]; then
              local resolved_tag=""
              while IFS= read -r candidate_tag; do
                local candidate_digest
                candidate_digest="$$(gcloud artifacts docker images describe "$${artifact_repo}:$${candidate_tag}" --format='value(image_summary.digest)' 2>/dev/null || true)"
                if [[ "$${candidate_digest}" == "$${artifact_digest}" ]]; then
                  resolved_tag="$${candidate_tag}"
                fi
              done < <(gcloud artifacts docker tags list "$${artifact_repo}" --format='value(tag)' 2>/dev/null | sed 's|.*/||' | grep -E "$${display_tag_pattern}" | sort -V)
              if [[ -n "$${resolved_tag}" ]]; then
                label="$${artifact_name}:$${resolved_tag}"
              fi
            fi
          fi

          printf '[%s](%s)' "$${label}" "$${url}"
        }

        pipeline_artifacts=""
        pipeline_log="/tmp/mattermost-cicd-$${pipeline_build_id}.log"
        pipeline_root_post_id_file="/tmp/mattermost-cicd-root-post-id"
        firewall_rule_name=""
        if [[ -z "$${MATTERMOST_CICD_TOKEN_ID:-}" || -z "$${MATTERMOST_CICD_TOKEN_SECRET:-}" ]]; then
          echo "Mattermost CI/CD token id and token secret must both be configured" >&2
          exit 1
        fi

        mattermost_post() {
          local text="$$1"
          local root_id="$${2:-}"
          local attach_log="$${3:-false}"
          local site_url="$${MATTERMOST_SITE_URL%/}"
          local file_ids_json="[]"

          if [[ "$${attach_log}" == "true" && -s "$${pipeline_log}" ]]; then
            local upload_response
            upload_response="$$(curl -fsS \
              -H "Authorization: Bearer $$MATTERMOST_CICD_TOKEN_SECRET" \
              -F "channel_id=$$MATTERMOST_CICD_CHANNEL_ID" \
              -F "files=@$${pipeline_log};filename=$${pipeline_build_id}.log" \
              "$${site_url}/api/v4/files" 2>/dev/null || true)"
            if [[ -n "$${upload_response}" ]]; then
              file_ids_json="$$(python3 -c 'import json,sys; data=json.load(sys.stdin); print(json.dumps([item["id"] for item in data.get("file_infos", []) if item.get("id")]))' <<<"$${upload_response}" 2>/dev/null || printf '[]')"
            fi
          fi

          local response
          response="$$(MATTERMOST_POST_TEXT="$${text}" MATTERMOST_POST_ROOT_ID="$${root_id}" MATTERMOST_POST_FILE_IDS="$${file_ids_json}" python3 -c 'import json, os; payload = {"channel_id": os.environ["MATTERMOST_CICD_CHANNEL_ID"], "message": os.environ["MATTERMOST_POST_TEXT"]}; root_id = os.environ.get("MATTERMOST_POST_ROOT_ID", ""); file_ids = json.loads(os.environ.get("MATTERMOST_POST_FILE_IDS", "[]")); payload.update({"root_id": root_id} if root_id else {}); payload.update({"file_ids": file_ids} if file_ids else {}); print(json.dumps(payload))' | curl -fsS -X POST -H "Authorization: Bearer $$MATTERMOST_CICD_TOKEN_SECRET" -H 'Content-Type: application/json' --data-binary @- "$${site_url}/api/v4/posts" 2>/dev/null || true)"
          if [[ -n "$${response}" ]]; then
            python3 -c 'import json,sys; print(json.load(sys.stdin).get("id", ""))' <<<"$${response}" 2>/dev/null || true
          fi
        }

        notify_mattermost() {
          local state="$$1"
          local exit_code="$${2:-}"
          local duration_seconds="$${3:-}"
          local icon="🔔"
          local state_label="$${state}"
          case "$${state}" in
            started)
              icon="🚀"
              state_label="started"
              ;;
            succeeded)
              icon="✅"
              state_label="succeeded"
              ;;
            failed)
              icon="❌"
              state_label="failed"
              ;;
          esac
          local tag_text="\`$${pipeline_tag}\`"
          if [[ -n "$${pipeline_github_repo}" && "$${pipeline_tag}" != "manual-or-untagged" ]]; then
            tag_text="[$${pipeline_tag}]($${pipeline_github_repo}/tree/$${pipeline_tag})"
          fi
          local commit_text="\`$${pipeline_short_sha}\`"
          if [[ -n "$${pipeline_github_repo}" && "$${pipeline_short_sha}" != "unknown-sha" ]]; then
            commit_text="[$${pipeline_short_sha}]($${pipeline_github_repo}/commit/$${pipeline_short_sha})"
          fi
          local project_text="$${pipeline_project}"
          if [[ -n "$${pipeline_github_repo}" ]]; then
            project_text="[$${pipeline_project}]($${pipeline_github_repo})"
          fi
          local text
          printf -v text '%s Build %s: **%s**\n\nProject: %s\nTag: %s\nCommit: %s\nBuild: [%s](%s)' \
            "$${icon}" \
            "$${state_label}" \
            "$${pipeline_name}" \
            "$${project_text}" \
            "$${tag_text}" \
            "$${commit_text}" \
            "$${pipeline_build_id}" \
            "$${pipeline_build_url}"

          if [[ -n "$${exit_code}" ]]; then
            if [[ -n "$${pipeline_artifacts}" ]]; then
              printf -v text '%s\n\n%s\n' "$${text}" "$${pipeline_artifacts}"
            fi
            printf -v text '%s\nDuration: `%ss`  ' "$${text}" "$${duration_seconds}"
          fi

          local root_post_id=""
          if [[ -f "$${pipeline_root_post_id_file}" ]]; then
            root_post_id="$$(cat "$${pipeline_root_post_id_file}")"
          fi

          local post_id
          if [[ "$${state}" == "started" ]]; then
            post_id="$$(mattermost_post "$${text}" "" "false")"
            if [[ -n "$${post_id}" ]]; then
              printf '%s' "$${post_id}" >"$${pipeline_root_post_id_file}"
            fi
          else
            mattermost_post "$${text}" "$${root_post_id}" "true" >/dev/null || true
          fi
        }

        cleanup_firewall() {
          if [[ -n "$${firewall_rule_name}" ]]; then
            gcloud compute firewall-rules delete "$${firewall_rule_name}" \
              --project="${_PROJECT_ID}" \
              --quiet >/dev/null 2>&1 || true
          fi
        }

        notify_done() {
          local exit_code="$$?"
          local duration_seconds="$$(( $$(date -u +%s) - pipeline_started_at ))"

          cleanup_firewall

          if [[ "$${exit_code}" -eq 0 ]]; then
            notify_mattermost "succeeded" "$${exit_code}" "$${duration_seconds}"
          else
            notify_mattermost "failed" "$${exit_code}" "$${duration_seconds}"
          fi

          exit "$${exit_code}"
        }

        trap notify_done EXIT
        notify_mattermost "started"
        exec > >(tee -a "$${pipeline_log}") 2>&1

        curl -fsSL -o /usr/local/bin/kubectl \
          "https://dl.k8s.io/release/$(curl -fsSL https://dl.k8s.io/release/stable.txt)/bin/linux/amd64/kubectl"
        chmod +x /usr/local/bin/kubectl

        curl -fsSL https://raw.githubusercontent.com/helm/helm/main/scripts/get-helm-3 | bash

        export TAG_NAME="$${PIPELINE_TAG:-}"
        export SHORT_SHA="$${PIPELINE_SHORT_SHA:-dev}"
        export CHART_REPOSITORY="${_CHART_REPOSITORY}"
        export CHART_VERSION="$${pipeline_chart_version}"
        if [[ -n "$${TAG_NAME}" ]]; then
          make publish-chart
        else
          echo "Branch deploy: using latest published chart version $${CHART_VERSION}"
        fi

        printf -v pipeline_artifacts 'Images:\n%s\n%s\n\nHelm Chart: %s' \
          "$$(artifact_link "${_IMAGE_REPO}:$${pipeline_image_tag}" "mattermost:$${pipeline_image_tag}" '^v.*-patched$$')" \
          "$$(artifact_link "${_IMAGE_REPO}:$${pipeline_dev_image_tag}" "mattermost:$${pipeline_dev_image_tag}" '^v.*patched-dev$$')" \
          "$$(artifact_link "$${chart_registry_path}/yourown-chat:$${pipeline_chart_version}" "yourown-chat:$${pipeline_chart_version}")"

        firewall_rule_name="yourown-chat-rke2-api-cb-${BUILD_ID}"

        cloudbuild_ip="$(curl -fsSL https://api.ipify.org)"
        gcloud compute firewall-rules create "${firewall_rule_name}" \
          --project="${_PROJECT_ID}" \
          --network="${_RKE2_API_FIREWALL_NETWORK}" \
          --direction=INGRESS \
          --priority=900 \
          --action=ALLOW \
          --rules=tcp:6443 \
          --source-ranges="${cloudbuild_ip}/32" \
          --target-tags="${_RKE2_API_TARGET_TAG}" \
          --description="Temporary Cloud Build access to yourown-chat RKE2 API for ${BUILD_ID}"

        gcloud secrets versions access latest \
          --project="${_PROJECT_ID}" \
          --secret="${_KUBECONFIG_SECRET}" \
          >/tmp/kubeconfig.yaml

        export KUBECONFIG=/tmp/kubeconfig.yaml
        export CHART_REPOSITORY="${_CHART_REPOSITORY}"
        export CHART_VERSION="$${CHART_VERSION}"
        export IMAGE_REPO="${_IMAGE_REPO}"
        export IMAGE_TAG="$${pipeline_image_tag}"
        export DEV_IMAGE_TAG="$${pipeline_dev_image_tag}"

        make deploy

options:
  logging: CLOUD_LOGGING_ONLY

substitutions:
  _PIPELINE_NAME: yourown-chat deploy
  _PROJECT_ID: gcloud-production-1
  _CLOUDBUILD_REGION: southamerica-east1
  _IMAGE_REPO: southamerica-east1-docker.pkg.dev/gcloud-production-1/mattermost/mattermost
  _MATTERMOST_SITE_URL: https://yourown.chat
  _CHART_REPOSITORY: oci://southamerica-east1-docker.pkg.dev/gcloud-production-1/mattermost
  _KUBECONFIG_SECRET: mattermost-rke2-kubeconfig
  _MATTERMOST_CICD_TOKEN_ID_SECRET_VERSION: projects/gcloud-production-1/secrets/mattermost-cicd-token-id/versions/latest
  _MATTERMOST_CICD_TOKEN_SECRET_VERSION: projects/gcloud-production-1/secrets/mattermost-cicd-token-secret/versions/latest
  _MATTERMOST_CICD_CHANNEL_ID_SECRET_VERSION: projects/gcloud-production-1/secrets/mattermost-cicd-channel-id/versions/latest
  _RKE2_API_FIREWALL_NETWORK: mattermost-southamerica-east1
  _RKE2_API_TARGET_TAG: yourown-chat-rke2

availableSecrets:
  secretManager:
    - versionName: ${_MATTERMOST_CICD_TOKEN_ID_SECRET_VERSION}
      env: MATTERMOST_CICD_TOKEN_ID
    - versionName: ${_MATTERMOST_CICD_TOKEN_SECRET_VERSION}
      env: MATTERMOST_CICD_TOKEN_SECRET
    - versionName: ${_MATTERMOST_CICD_CHANNEL_ID_SECRET_VERSION}
      env: MATTERMOST_CICD_CHANNEL_ID