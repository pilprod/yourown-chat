steps:
  - name: gcr.io/google.com/cloudsdktool/google-cloud-cli:alpine
    id: deploy-to-rke2
    env:
      - PIPELINE_NAME=${_PIPELINE_NAME}
      - PIPELINE_PROJECT_ID=$PROJECT_ID
      - PIPELINE_BUILD_ID=$BUILD_ID
      - PIPELINE_CLOUDBUILD_REGION=${_CLOUDBUILD_REGION}
      - PIPELINE_GITHUB_REPO=https://github.com/pilprod/yourown-chat
      - PIPELINE_TAG=$TAG_NAME
      - PIPELINE_SHORT_SHA=$SHORT_SHA
      - IMAGE_TRIGGER_TAG=${_IMAGE_TRIGGER_TAG}
      - IMAGE_TRIGGER_PROJECT=${_IMAGE_TRIGGER_PROJECT}
      - IMAGE_TRIGGER_REPO=${_IMAGE_TRIGGER_REPO}
      - IMAGE_TRIGGER_SHORT_SHA=${_IMAGE_TRIGGER_SHORT_SHA}
      - TARGET_PROJECT_ID=${_PROJECT_ID}
      - IMAGE_REPO=${_IMAGE_REPO}
      - CHART_REPOSITORY=${_CHART_REPOSITORY}
      - CLOUDDEPLOY_DELIVERY_PIPELINE=${_CLOUDDEPLOY_DELIVERY_PIPELINE}
      - CLOUDDEPLOY_REGION=${_CLOUDDEPLOY_REGION}
      - KUBECONFIG_SECRET=${_KUBECONFIG_SECRET}
      - RKE2_API_TUNNEL_INSTANCE=${_RKE2_API_TUNNEL_INSTANCE}
      - RKE2_API_TUNNEL_ZONE=${_RKE2_API_TUNNEL_ZONE}
    script: |
      #!/usr/bin/env bash
      set -euo pipefail

        apk add --no-cache bash ca-certificates curl helm kubectl make python3

        pipeline_started_at="$(date -u +%s)"
        pipeline_tag="${PIPELINE_TAG:-manual-or-untagged}"
        pipeline_github_repo="${PIPELINE_GITHUB_REPO:-}"
        pipeline_project="${pipeline_github_repo#https://github.com/}"
        pipeline_short_sha="${PIPELINE_SHORT_SHA:-unknown-sha}"
        pipeline_build_id="${PIPELINE_BUILD_ID:-unknown-build}"
        pipeline_project_id="${PIPELINE_PROJECT_ID:-${TARGET_PROJECT_ID}}"
        pipeline_cloudbuild_region="${PIPELINE_CLOUDBUILD_REGION:-southamerica-east1}"
        pipeline_name="${PIPELINE_NAME:-Cloud Build}"
        workflow_name="yourown-chat deploy"
        image_trigger_tag="${IMAGE_TRIGGER_TAG:-}"
        if [[ -n "${image_trigger_tag}" ]]; then
          pipeline_tag="${image_trigger_tag}"
          workflow_name="mattermost image"
          if [[ -n "${IMAGE_TRIGGER_REPO:-}" ]]; then
            pipeline_github_repo="${IMAGE_TRIGGER_REPO}"
          fi
          if [[ -n "${IMAGE_TRIGGER_SHORT_SHA:-}" ]]; then
            pipeline_short_sha="${IMAGE_TRIGGER_SHORT_SHA}"
          fi
          if [[ -n "${IMAGE_TRIGGER_PROJECT:-}" ]]; then
            pipeline_project="${IMAGE_TRIGGER_PROJECT}"
          else
            pipeline_project="${pipeline_github_repo#https://github.com/}"
          fi
        fi
        if [[ -z "${pipeline_project}" || "${pipeline_project}" == "${pipeline_github_repo}" ]]; then
          pipeline_project="${pipeline_name}"
        fi
        pipeline_build_url="https://console.cloud.google.com/cloud-build/builds;region=${pipeline_cloudbuild_region}/${pipeline_build_id}?project=${pipeline_project_id}"
        pipeline_workflow_id="${pipeline_project}|${pipeline_tag}"
        if [[ "${pipeline_tag}" == "manual-or-untagged" ]]; then
          pipeline_workflow_id="${pipeline_workflow_id}|${pipeline_short_sha}"
        fi
        pipeline_tag_url=""
        if [[ -n "${pipeline_github_repo}" && "${pipeline_tag}" != "manual-or-untagged" ]]; then
          pipeline_tag_url="${pipeline_github_repo}/tree/${pipeline_tag}"
        fi
        pipeline_commit_url=""
        if [[ -n "${pipeline_github_repo}" && "${pipeline_short_sha}" != "unknown-sha" ]]; then
          pipeline_commit_url="${pipeline_github_repo}/commit/${pipeline_short_sha}"
        fi
        chart_repository="${CHART_REPOSITORY}"
        chart_registry_path="${chart_repository#oci://}"
        pipeline_chart_version="${PIPELINE_TAG:-}"
        if [[ -z "${pipeline_chart_version}" ]]; then
          pipeline_chart_version="$(gcloud artifacts docker tags list "${chart_registry_path}/yourown-chat" \
            --format='value(tag)' \
            | sed 's|.*/||' \
            | grep -E '^[0-9]+\.[0-9]+\.[0-9]+$' \
            | sort -V \
            | tail -n 1)"
        fi
        if [[ ! "${pipeline_chart_version}" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
          echo "Chart version must be numeric semver, got: ${pipeline_chart_version}" >&2
          exit 1
        fi

        artifact_json() {
          local artifact_ref="$1"
          local display_label="${2:-${artifact_ref}}"
          local display_tag_pattern="${3:-}"
          local artifact_repo="${artifact_ref%:*}"
          local artifact_tag="${artifact_ref##*:}"
          local artifact_host="${artifact_repo%%/*}"
          local artifact_path="${artifact_repo#*/}"
          local artifact_location="${artifact_host%-docker.pkg.dev}"
          local artifact_project_id="${artifact_path%%/*}"
          local artifact_path_remainder="${artifact_path#*/}"
          local artifact_registry_repo="${artifact_path_remainder%%/*}"
          local artifact_name="${artifact_path_remainder#*/}"
          local artifact_digest
          artifact_digest="$(gcloud artifacts docker images describe "${artifact_ref}" --format='value(image_summary.digest)' 2>/dev/null || true)"

          local label="${display_label}"
          local url="https://console.cloud.google.com/artifacts/docker/${artifact_project_id}/${artifact_location}/${artifact_registry_repo}/${artifact_name}/${artifact_tag}?project=${artifact_project_id}"
          if [[ -n "${artifact_digest}" ]]; then
            url="https://console.cloud.google.com/artifacts/docker/${artifact_project_id}/${artifact_location}/${artifact_registry_repo}/${artifact_name}/${artifact_digest}?project=${artifact_project_id}"
            if [[ -n "${display_tag_pattern}" ]]; then
              local resolved_tag=""
              while IFS= read -r candidate_tag; do
                local candidate_digest
                candidate_digest="$(gcloud artifacts docker images describe "${artifact_repo}:${candidate_tag}" --format='value(image_summary.digest)' 2>/dev/null || true)"
                if [[ "${candidate_digest}" == "${artifact_digest}" ]]; then
                  resolved_tag="${candidate_tag}"
                fi
              done < <(gcloud artifacts docker tags list "${artifact_repo}" --format='value(tag)' 2>/dev/null | sed 's|.*/||' | grep -E "${display_tag_pattern}" | sort -V)
              if [[ -n "${resolved_tag}" ]]; then
                label="${artifact_name}:${resolved_tag}"
              fi
            fi
          fi

          ARTIFACT_LABEL="${label}" ARTIFACT_URL="${url}" ARTIFACT_REF="${artifact_ref}" \
            python3 -c 'import json, os; print(json.dumps({"label": os.environ["ARTIFACT_LABEL"], "url": os.environ["ARTIFACT_URL"], "ref": os.environ["ARTIFACT_REF"]}, separators=(",", ":")))'
        }

        latest_image_tag() {
          local tag_pattern="$1"
          local tag_label="$2"
          local image_tag
          image_tag="$(gcloud artifacts docker tags list "${IMAGE_REPO}" --format='value(tag)' 2>/dev/null \
            | sed 's|.*/||' \
            | grep -E "${tag_pattern}" \
            | sort -V \
            | tail -n 1 || true)"
          if [[ -z "${image_tag}" ]]; then
            echo "No Mattermost image tag matching ${tag_label} found in ${IMAGE_REPO}" >&2
            exit 1
          fi

          printf '%s' "${image_tag}"
        }

        image_digest() {
          local image_tag="$1"
          local digest
          digest="$(gcloud artifacts docker images describe "${IMAGE_REPO}:${image_tag}" --format='value(image_summary.digest)' 2>/dev/null || true)"
          if [[ -z "${digest}" ]]; then
            echo "Image tag ${IMAGE_REPO}:${image_tag} does not resolve to a digest" >&2
            exit 1
          fi

          printf '%s' "${digest}"
        }

        pipeline_image_tag="$(latest_image_tag '^v.*-patched$' 'v*-patched')"
        pipeline_dev_image_tag="$(latest_image_tag '^v.*patched-dev$' 'v*-patched-dev')"
        pipeline_image_digest="$(image_digest "${pipeline_image_tag}")"
        pipeline_dev_image_digest="$(image_digest "${pipeline_dev_image_tag}")"

        pipeline_artifacts_json=""
          pipeline_final_report_sent=false

        emit_cicd_report() {
          local stage="$1"
          local state="$2"
          local exit_code="${3:-}"
          local duration_seconds="${4:-}"
          local report_name="${pipeline_name}"
          if [[ "${stage}" == "workflow" ]]; then
            report_name="${workflow_name}"
          elif [[ "${stage}" == "deploy" ]]; then
            report_name="yourown-chat deploy"
          fi
          CICD_REPORT_WORKFLOW_ID="${pipeline_workflow_id}" \
          CICD_REPORT_WORKFLOW_NAME="${workflow_name}" \
          CICD_REPORT_STAGE="${stage}" \
          CICD_REPORT_STATE="${state}" \
          CICD_REPORT_NAME="${report_name}" \
          CICD_REPORT_PROJECT_LABEL="${pipeline_project}" \
          CICD_REPORT_PROJECT_URL="${pipeline_github_repo}" \
          CICD_REPORT_TAG_LABEL="${pipeline_tag}" \
          CICD_REPORT_TAG_URL="${pipeline_tag_url}" \
          CICD_REPORT_COMMIT_LABEL="${pipeline_short_sha}" \
          CICD_REPORT_COMMIT_URL="${pipeline_commit_url}" \
          CICD_REPORT_BUILD_ID="${pipeline_build_id}" \
          CICD_REPORT_BUILD_URL="${pipeline_build_url}" \
          CICD_REPORT_RELEASE_LABEL="${clouddeploy_release_name:-}" \
          CICD_REPORT_RELEASE_URL="${clouddeploy_release_url:-}" \
          CICD_REPORT_EXIT_CODE="${exit_code}" \
          CICD_REPORT_DURATION_SECONDS="${duration_seconds}" \
          CICD_REPORT_ARTIFACTS_JSON="${pipeline_artifacts_json}" \
          python3 -c 'import json, os; payload = {"workflow_id": os.environ["CICD_REPORT_WORKFLOW_ID"], "workflow_name": os.environ["CICD_REPORT_WORKFLOW_NAME"], "stage": os.environ["CICD_REPORT_STAGE"], "state": os.environ["CICD_REPORT_STATE"], "name": os.environ["CICD_REPORT_NAME"], "build_id": os.environ["CICD_REPORT_BUILD_ID"], "project": {"label": os.environ["CICD_REPORT_PROJECT_LABEL"], "url": os.environ.get("CICD_REPORT_PROJECT_URL", "")}, "tag": {"label": os.environ["CICD_REPORT_TAG_LABEL"], "url": os.environ.get("CICD_REPORT_TAG_URL", "")}, "commit": {"label": os.environ["CICD_REPORT_COMMIT_LABEL"], "url": os.environ.get("CICD_REPORT_COMMIT_URL", "")}, "build": {"label": os.environ["CICD_REPORT_BUILD_ID"], "url": os.environ["CICD_REPORT_BUILD_URL"]}}; payload.update({"release_id": os.environ["CICD_REPORT_RELEASE_LABEL"], "release": {"label": os.environ["CICD_REPORT_RELEASE_LABEL"], "url": os.environ["CICD_REPORT_RELEASE_URL"]}} if os.environ.get("CICD_REPORT_RELEASE_LABEL") else {}); payload.update({"exit_code": int(os.environ["CICD_REPORT_EXIT_CODE"])} if os.environ.get("CICD_REPORT_EXIT_CODE") else {}); payload.update({"duration_seconds": int(os.environ["CICD_REPORT_DURATION_SECONDS"])} if os.environ.get("CICD_REPORT_DURATION_SECONDS") else {}); artifacts = json.loads(os.environ.get("CICD_REPORT_ARTIFACTS_JSON") or "{}"); payload.update({"artifacts": artifacts} if artifacts else {}); print("CICD_REPORT " + json.dumps(payload, separators=(",", ":")))'
        }

        notify_done() {
          local exit_code="$?"
          local duration_seconds="$(( $(date -u +%s) - pipeline_started_at ))"

          if [[ "${pipeline_final_report_sent}" == "true" ]]; then
            exit "${exit_code}"
          fi

          if [[ "${exit_code}" -eq 0 ]]; then
            emit_cicd_report "build" "succeeded" "${exit_code}" "${duration_seconds}"
          else
            emit_cicd_report "build" "failed" "${exit_code}" "${duration_seconds}"
          fi

          exit "${exit_code}"
        }

        trap notify_done EXIT
        emit_cicd_report "workflow" "started"
        emit_cicd_report "build" "started"

        export TAG_NAME="${PIPELINE_TAG:-}"
        export SHORT_SHA="${PIPELINE_SHORT_SHA:-dev}"
        export CHART_REPOSITORY="${CHART_REPOSITORY}"
        export CHART_VERSION="${pipeline_chart_version}"
        if [[ -n "${TAG_NAME}" ]]; then
          make publish-chart
        else
          echo "Branch deploy: using latest published chart version ${CHART_VERSION}"
        fi

        pipeline_prod_image_artifact="$(artifact_json "${IMAGE_REPO}:${pipeline_image_tag}" "mattermost:${pipeline_image_tag}")"
        pipeline_dev_image_artifact="$(artifact_json "${IMAGE_REPO}:${pipeline_dev_image_tag}" "mattermost:${pipeline_dev_image_tag}")"
        pipeline_chart_artifact="$(artifact_json "${chart_registry_path}/yourown-chat:${pipeline_chart_version}" "yourown-chat:${pipeline_chart_version}")"

        release_version="${pipeline_chart_version//./-}"
        release_suffix="$(printf '%s' "${pipeline_build_id}" | tr -cd '[:alnum:]' | cut -c1-8)"
        clouddeploy_release_name="yourown-chat-${release_version}-${release_suffix}"
        clouddeploy_source_dir="/tmp/yourown-chat-clouddeploy-source"
        rm -rf "${clouddeploy_source_dir}"
        mkdir -p "${clouddeploy_source_dir}"
        cp -R \
          Makefile \
          certs.yaml \
          clusterissuer.yaml \
          operator.yaml \
          helm \
          clouddeploy \
          "${clouddeploy_source_dir}/"
        cp clouddeploy/skaffold.yaml "${clouddeploy_source_dir}/skaffold.yaml"
        {
          printf 'TARGET_PROJECT_ID=%s\n' "${TARGET_PROJECT_ID}"
          printf 'CHART_REPOSITORY=%s\n' "${CHART_REPOSITORY}"
          printf 'CHART_VERSION=%s\n' "${pipeline_chart_version}"
          printf 'IMAGE_REPO=%s\n' "${IMAGE_REPO}"
          printf 'IMAGE_TAG=%s\n' "${pipeline_image_tag}"
          printf 'DEV_IMAGE_TAG=%s\n' "${pipeline_dev_image_tag}"
          printf 'PROD_IMAGE_TAG=%s\n' "${pipeline_image_tag}"
          printf 'PROD_IMAGE_DIGEST=%s\n' "${pipeline_image_digest}"
          printf 'DEV_IMAGE_DIGEST=%s\n' "${pipeline_dev_image_digest}"
          printf 'PROD_IMAGE_WITH_DIGEST=%s@%s\n' "${IMAGE_REPO}" "${pipeline_image_digest}"
          printf 'DEV_IMAGE_WITH_DIGEST=%s@%s\n' "${IMAGE_REPO}" "${pipeline_dev_image_digest}"
          printf 'KUBECONFIG_SECRET=%s\n' "${KUBECONFIG_SECRET}"
          printf 'RKE2_API_TUNNEL_INSTANCE=%s\n' "${RKE2_API_TUNNEL_INSTANCE}"
          printf 'RKE2_API_TUNNEL_ZONE=%s\n' "${RKE2_API_TUNNEL_ZONE}"
          printf 'CICD_WORKFLOW_ID=%q\n' "${pipeline_workflow_id}"
          printf 'CICD_WORKFLOW_NAME=%q\n' "${workflow_name}"
          printf 'CICD_PROJECT_LABEL=%q\n' "${pipeline_project}"
          printf 'CICD_PROJECT_URL=%q\n' "${pipeline_github_repo}"
          printf 'CICD_TAG_LABEL=%q\n' "${pipeline_tag}"
          printf 'CICD_TAG_URL=%q\n' "${pipeline_tag_url}"
          printf 'CICD_COMMIT_LABEL=%q\n' "${pipeline_short_sha}"
          printf 'CICD_COMMIT_URL=%q\n' "${pipeline_commit_url}"
          printf 'CICD_BUILD_ID=%q\n' "${pipeline_build_id}"
          printf 'CICD_BUILD_URL=%q\n' "${pipeline_build_url}"
        } >"${clouddeploy_source_dir}/clouddeploy-release.env"

        clouddeploy_release_args=(
          --project="${TARGET_PROJECT_ID}"
          --region="${CLOUDDEPLOY_REGION}"
          --delivery-pipeline="${CLOUDDEPLOY_DELIVERY_PIPELINE}"
          --source="${clouddeploy_source_dir}"
        )
        gcloud deploy releases create "${clouddeploy_release_name}" "${clouddeploy_release_args[@]}"

        clouddeploy_release_url="https://console.cloud.google.com/deploy/delivery-pipelines/${CLOUDDEPLOY_REGION}/${CLOUDDEPLOY_DELIVERY_PIPELINE}/releases/${clouddeploy_release_name}?project=${TARGET_PROJECT_ID}"
        pipeline_clouddeploy_artifact="$(ARTIFACT_LABEL="${clouddeploy_release_name}" ARTIFACT_URL="${clouddeploy_release_url}" python3 -c 'import json, os; print(json.dumps({"label": os.environ["ARTIFACT_LABEL"], "url": os.environ["ARTIFACT_URL"]}, separators=(",", ":")))')"
        CICD_IMAGE_PROD="${pipeline_prod_image_artifact}" \
        CICD_IMAGE_DEV="${pipeline_dev_image_artifact}" \
        CICD_CHART="${pipeline_chart_artifact}" \
          python3 -c 'import json, os; payload = {"images": [json.loads(os.environ["CICD_IMAGE_PROD"]), json.loads(os.environ["CICD_IMAGE_DEV"])], "chart": json.loads(os.environ["CICD_CHART"])}; print(json.dumps(payload, separators=(",", ":")))' >/tmp/yourown-chat-build-artifacts.json
        pipeline_artifacts_json="$(cat /tmp/yourown-chat-build-artifacts.json)"
        emit_cicd_report "build" "succeeded" "0" "$(( $(date -u +%s) - pipeline_started_at ))"
        pipeline_final_report_sent=true

        pipeline_artifacts_json="$(CICD_CLOUD_DEPLOY="${pipeline_clouddeploy_artifact}" python3 -c 'import json, os; print(json.dumps({"cloud_deploy": json.loads(os.environ["CICD_CLOUD_DEPLOY"])}, separators=(",", ":")))')"
        emit_cicd_report "deploy" "started"

options:
  logging: CLOUD_LOGGING_ONLY

substitutions:
  _PIPELINE_NAME: yourown-chat build
  _PROJECT_ID: gcloud-production-1
  _CLOUDBUILD_REGION: southamerica-east1
  _IMAGE_REPO: southamerica-east1-docker.pkg.dev/gcloud-production-1/mattermost/mattermost
  _CHART_REPOSITORY: oci://southamerica-east1-docker.pkg.dev/gcloud-production-1/mattermost
  _CLOUDDEPLOY_DELIVERY_PIPELINE: yourown-chat
  _CLOUDDEPLOY_REGION: southamerica-east1
  _KUBECONFIG_SECRET: mattermost-rke2-kubeconfig
  _RKE2_API_TUNNEL_INSTANCE: yourown-chat-rke2-southamerica-east1
  _RKE2_API_TUNNEL_ZONE: southamerica-east1-a
  _IMAGE_TRIGGER_TAG: ''
  _IMAGE_TRIGGER_PROJECT: ''
  _IMAGE_TRIGGER_REPO: ''
  _IMAGE_TRIGGER_SHORT_SHA: ''