apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# Dev overlay: sample-dev namespace, single replica (cost-capped cluster). This
# is the first stage of the Cloud Deploy pipeline and runs the Skaffold `verify`
# smoke test after each deploy.
namespace: sample-dev

resources:
  - namespace.yaml
  - ../base

replicas:
  - name: sample-app
    count: 1
