apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# Environment-neutral base for the sample workload. The dev/ and prod/ overlays
# pin the namespace (and dev the replica count); Cloud Deploy binds one overlay
# per stage via the matching Skaffold profile. The container image stays the
# literal `sample-app` so Skaffold/Cloud Deploy can substitute the released tag.
resources:
  - deployment.yaml
  - service.yaml
