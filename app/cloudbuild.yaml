# Illustrative Cloud Build pipeline for the sample app: build -> push to the
# unified Artifact Registry -> cut a Cloud Deploy release that enters the
# delivery pipeline at its first stage (dev) and is promoted to prod after the
# verify + manual-approval gates.
#
# This is a REFERENCE config (not created by Terraform). To wire it up, add a
# Cloud Build 2nd-gen GitHub trigger for this repo (the build stack already
# provisions a GitHub connection for the Mattermost image). The runner SA needs,
# on top of registry-writer: roles/clouddeploy.releaser on the pipeline and
# roles/iam.serviceAccountUser (actAs) on the Cloud Deploy execution SA
# (ycs-clouddeploy@) so `releases create` can hand off to the pipeline.

substitutions:
  _REGION: europe-west3
  _REPO: ycs-containers
  _IMAGE: sample-app
  _PIPELINE: ycs-pipeline
  _BUILD_SA_EMAIL: ycs-img-build@${PROJECT_ID}.iam.gserviceaccount.com

serviceAccount: projects/${PROJECT_ID}/serviceAccounts/${_BUILD_SA_EMAIL}

options:
  logging: CLOUD_LOGGING_ONLY
  dynamicSubstitutions: true

images:
  - "${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO}/${_IMAGE}:${SHORT_SHA}"

steps:
  - id: build
    name: gcr.io/cloud-builders/docker
    dir: app
    args:
      - build
      - -t
      - "${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO}/${_IMAGE}:${SHORT_SHA}"
      - .

  - id: push
    name: gcr.io/cloud-builders/docker
    args:
      - push
      - "${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO}/${_IMAGE}:${SHORT_SHA}"

  - id: release
    name: gcr.io/google.com/cloudsdktool/cloud-sdk:slim
    dir: app
    entrypoint: gcloud
    args:
      - deploy
      - releases
      - create
      - "rel-${SHORT_SHA}-${BUILD_ID}"
      - --project=${PROJECT_ID}
      - --region=${_REGION}
      - --delivery-pipeline=${_PIPELINE}
      - --source=.
      - --images=${_IMAGE}=${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO}/${_IMAGE}:${SHORT_SHA}
