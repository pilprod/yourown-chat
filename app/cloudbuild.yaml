# Cloud Build pipeline: build -> push to Artifact Registry -> cut a Cloud Deploy
# release that rolls out to GKE via the delivery pipeline.
#
# Runs as the dedicated, least-privilege Cloud Build SA created by Terraform.
# Wire this to GitLab via a Cloud Build 2nd-gen connection + trigger (the
# connection needs a GitLab PAT stored in Secret Manager — a one-time manual/
# scripted step, see README).

substitutions:
  _REGION: europe-west3
  _REPO: containers
  _IMAGE: sample-app
  _PIPELINE: ycs-prod-pipeline
  _BUILD_SA_EMAIL: ycs-prod-cloudbuild@${PROJECT_ID}.iam.gserviceaccount.com

serviceAccount: projects/${PROJECT_ID}/serviceAccounts/${_BUILD_SA_EMAIL}

options:
  logging: CLOUD_LOGGING_ONLY
  dynamicSubstitutions: true

images:
  - "${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO}/${_IMAGE}:${SHORT_SHA}"

steps:
  - id: build
    name: gcr.io/cloud-builders/docker
    dir: app
    args:
      - build
      - -t
      - "${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO}/${_IMAGE}:${SHORT_SHA}"
      - .

  - id: push
    name: gcr.io/cloud-builders/docker
    args:
      - push
      - "${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO}/${_IMAGE}:${SHORT_SHA}"

  - id: release
    name: gcr.io/google.com/cloudsdktool/cloud-sdk:slim
    dir: app
    entrypoint: gcloud
    args:
      - deploy
      - releases
      - create
      - "rel-${SHORT_SHA}-${BUILD_ID}"
      - --project=${PROJECT_ID}
      - --region=${_REGION}
      - --delivery-pipeline=${_PIPELINE}
      - --source=.
      - --images=${_IMAGE}=${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO}/${_IMAGE}:${SHORT_SHA}
