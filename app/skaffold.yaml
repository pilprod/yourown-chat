# Skaffold config consumed by Cloud Deploy to render and apply manifests.
#
# ONE artifact, promoted dev -> prod. Each Cloud Deploy stage binds a profile
# (see terraform/platform/modules/clouddeploy): `dev` renders the sample-dev
# overlay and runs the post-deploy `verify` smoke test; `prod` renders the
# sample-prod overlay (promotion gated by manual approval). The container image
# stays the literal `sample-app` so Cloud Deploy substitutes the released tag.
apiVersion: skaffold/v4beta11
kind: Config
metadata:
  name: yourown-chat
manifests:
  kustomize:
    paths:
      - k8s/base
deploy:
  kubectl: {}
profiles:
  # dev: first stage. Single replica + post-deploy verification.
  - name: dev
    manifests:
      kustomize:
        paths:
          - k8s/dev
    verify:
      - name: smoke-test
        container:
          name: smoke-test
          image: curlimages/curl:8.10.1
          command: ["/bin/sh", "-c"]
          args:
            - >-
              curl -sSf --retry 10 --retry-connrefused --retry-delay 3
              http://sample-app.sample-dev.svc.cluster.local/ >/dev/null
        # Run the probe ON the target cluster (GKE only) so it can reach the
        # ClusterIP service by in-cluster DNS. Without this, Cloud Deploy runs
        # verify in its Cloud Build execution environment, which cannot resolve
        # sample-app.sample-dev.svc.cluster.local.
        executionMode:
          kubernetesCluster: {}
  # prod: promotion target. Same artifact, sample-prod namespace, no verify.
  - name: prod
    manifests:
      kustomize:
        paths:
          - k8s/prod
