---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: yourown-chat-crt
spec:
  secretName: yourown-chat-tls
  issuerRef:
    name: letsencrypt
    kind: ClusterIssuer
  dnsNames:
    - 'yourown.chat'
---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: yourown-chat-rtcd-crt
spec:
  secretName: yourown-chat-rtcd-tls
  issuerRef:
    name: letsencrypt
    kind: ClusterIssuer
  dnsNames:
    - 'yourown-chat-rtcd.yourown.chat'